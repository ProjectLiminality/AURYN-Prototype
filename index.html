<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURYN</title>
<style>
  @font-face {
    font-family: 'TeX Gyre Termes';
    src: url('fonts/texgyretermes-regular.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; color: #e0e0e0;
    font-family: 'TeX Gyre Termes', Georgia, serif;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ===== CONTEXT ZONE (upper half) ===== */
  #context-zone {
    height: 40vh; min-height: 160px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    flex-shrink: 0;
  }

  #auryn-symbol {
    width: 120px; height: 120px;
    border-radius: 50%; overflow: hidden;
    cursor: pointer; position: relative;
    z-index: 2; flex-shrink: 0;
    border: 2px solid rgba(255, 215, 0, 0.3);
    transition: border-color 0.3s, transform 0.2s;
  }
  #auryn-symbol:hover {
    border-color: rgba(255, 215, 0, 0.7);
    transform: scale(1.05);
  }
  #auryn-symbol img {
    width: 100%; height: 100%; object-fit: cover;
  }

  /* Petals container — positioned around the AURYN symbol */
  #petals-ring {
    position: absolute; top: 50%; left: 50%;
    width: 0; height: 0;
    z-index: 1;
  }

  .petal {
    position: absolute;
    width: 52px; height: 52px;
    border-radius: 50%; overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s ease, opacity 0.3s ease;
    border: 2px solid rgba(100, 149, 237, 0.6);
  }
  .petal.dreamer { border-color: rgba(205, 92, 92, 0.6); }
  .petal:hover { transform: scale(1.15) !important; }
  .petal img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .petal .petal-remove {
    position: absolute; top: -4px; right: -4px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #333; color: #aaa; border: none;
    font-size: 10px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    line-height: 1;
  }
  .petal:hover .petal-remove { display: flex; }
  .petal .petal-label {
    position: absolute; bottom: -18px; left: 50%;
    transform: translateX(-50%);
    font-size: 9px; color: #555;
    white-space: nowrap; max-width: 80px;
    overflow: hidden; text-overflow: ellipsis;
    font-family: -apple-system, sans-serif;
    pointer-events: none; opacity: 0;
    transition: opacity 0.2s;
  }
  .petal:hover .petal-label { opacity: 1; }

  /* No-image petal fallback */
  .petal .petal-initials {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #1a1a1a; color: #888;
    font-size: 14px; font-weight: bold;
    font-family: -apple-system, sans-serif;
  }

  /* ===== CHAT ZONE (lower half) ===== */
  #chat-zone {
    flex: 1; display: flex; flex-direction: column;
    min-height: 0; /* allow flex shrink */
    border-top: 1px solid #111;
  }

  #messages {
    flex: 1; overflow-y: auto; padding: 16px 16px;
    display: flex; flex-direction: column; gap: 16px;
    scrollbar-width: thin; scrollbar-color: #333 #000;
  }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: #000; }
  #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  .msg { border-radius: 12px; line-height: 1.6; }
  .msg.user {
    align-self: flex-end; max-width: 85%; background: #1a1a1a; color: #ccc;
    border: 1px solid #333; font-size: 16px; padding: 10px 16px;
  }
  .msg.assistant {
    align-self: flex-start; width: 100%; position: relative; padding: 0;
  }
  .msg.transcript {
    align-self: flex-start; width: 100%; position: relative; padding: 0;
  }
  .msg.tool-call-block {
    align-self: flex-start; width: 100%;
    background: #0d1117; border-left: 3px solid #334;
    border-radius: 6px; padding: 8px 12px; font-size: 0.85em;
    color: #aaa; font-family: monospace;
  }
  .msg.tool-call-block .tool-name {
    color: #7aadff; font-weight: bold; margin-bottom: 4px;
  }
  .msg.tool-call-block details { margin-top: 4px; }
  .msg.tool-call-block summary { cursor: pointer; opacity: 0.7; }
  .msg.tool-call-block summary:hover { opacity: 1; }
  .msg.tool-call-block pre {
    white-space: pre-wrap; margin: 6px 0 0;
    max-height: 300px; overflow-y: auto;
    font-size: 0.9em; color: #ccc;
    background: #0a0a0a; padding: 6px; border-radius: 4px;
  }

  /* The rendered markdown text layer */
  .msg.assistant .text-layer, .msg.transcript .text-layer {
    font-family: 'TeX Gyre Termes', Georgia, serif;
    font-size: 20px; color: #fff; line-height: 1.6;
    word-wrap: break-word;
  }
  .msg.transcript .text-layer { color: #b0b0b0; }
  .msg.assistant .text-layer p { margin-bottom: 0.6em; }
  .msg.assistant .text-layer p:last-child { margin-bottom: 0; }
  .msg.assistant .text-layer strong { font-weight: bold; }
  .msg.assistant .text-layer em { font-style: italic; }
  .msg.assistant .text-layer code {
    background: #1a1a1a; padding: 1px 5px; border-radius: 3px;
    font-family: monospace; font-size: 0.9em;
  }
  .msg.assistant .text-layer .list-block {
    margin: 0.3em 0;
  }
  .msg.assistant .text-layer .list-item {
    padding-left: 0;
  }

  /* SVG animation overlay — positioned over the text layer */
  .msg.assistant .svg-overlay, .msg.transcript .svg-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1;
  }
  .msg.assistant .svg-overlay svg, .msg.transcript .svg-overlay svg {
    width: 100%; height: 100%; display: block;
  }

  .streaming-cursor {
    display: inline-block; width: 2px; height: 1em;
    background: #FFD700; margin-left: 2px;
    animation: blink 0.8s step-end infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Write animation keyframes */
  @keyframes stroke-draw { to { stroke-dashoffset: 0; } }
  @keyframes fill-reveal { to { fill-opacity: 1; } }
  @keyframes stroke-fade { to { stroke-opacity: 0; } }
  @keyframes overlay-fadeout { to { opacity: 0; } }

  .char-path-stroke {
    fill: transparent; stroke: #fff; stroke-width: 1.5;
    fill-opacity: 0; stroke-opacity: 1;
  }
  .char-path-fill {
    fill: #fff; fill-opacity: 0; stroke: none;
  }
  /* Transcript uses muted color */
  .msg.transcript .char-path-stroke { stroke: #b0b0b0; }
  .msg.transcript .char-path-fill { fill: #b0b0b0; }

  /* ===== INPUT AREA ===== */
  #input-area {
    padding: 12px 16px; border-top: 1px solid #1a1a1a;
    display: flex; gap: 10px; align-items: flex-end;
    background: #000; position: relative;
  }
  #input-area textarea {
    flex: 1; background: #111; border: 1px solid #333;
    border-radius: 8px; color: #e0e0e0; padding: 10px 14px;
    font-family: inherit; font-size: 16px; resize: none;
    outline: none; min-height: 42px; max-height: 40vh;
    line-height: 1.4;
  }
  #input-area textarea:focus { border-color: #555; }
  #input-area textarea::placeholder { color: #444; }

  #send-btn, #stop-btn, #mic-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
  }
  #send-btn { background: #FFD700; color: #000; }
  #send-btn.garden-mode { background: #2d5a27; color: #7fff7f; }
  #send-btn:disabled { background: #333; color: #666; cursor: default; }
  #send-btn svg { width: 18px; height: 18px; }
  #stop-btn { background: #8B0000; color: #fff; display: none; }
  #stop-btn svg { width: 16px; height: 16px; }
  #mic-btn { background: #222; color: #888; }
  #mic-btn:disabled { opacity: 0.3; cursor: default; }
  #mic-btn svg { width: 18px; height: 18px; }
  #mic-btn.recording { background: #8B0000; color: #fff; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

  /* ===== AUTOCOMPLETE DROPDOWN ===== */
  #autocomplete {
    display: none; position: absolute;
    bottom: 100%; left: 16px; right: 68px;
    max-height: 240px; overflow-y: auto;
    background: #111; border: 1px solid #333;
    border-radius: 8px 8px 0 0;
    z-index: 50;
    scrollbar-width: thin; scrollbar-color: #333 #111;
  }
  #autocomplete::-webkit-scrollbar { width: 4px; }
  #autocomplete::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .ac-item {
    padding: 8px 12px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid #1a1a1a;
    transition: background 0.1s;
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.selected { background: #1a1a1a; }
  .ac-item .ac-thumb {
    width: 28px; height: 28px; border-radius: 50%;
    overflow: hidden; flex-shrink: 0;
    border: 1.5px solid rgba(100, 149, 237, 0.5);
  }
  .ac-item .ac-thumb.dreamer { border-color: rgba(205, 92, 92, 0.5); }
  .ac-item .ac-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .ac-item .ac-thumb .ac-initials {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #1a1a1a; color: #555; font-size: 10px;
    font-family: -apple-system, sans-serif;
  }
  .ac-item .ac-title {
    color: #ccc; font-size: 14px;
    font-family: -apple-system, sans-serif;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .ac-item .ac-type {
    margin-left: auto; font-size: 10px; color: #444;
    font-family: -apple-system, sans-serif;
    flex-shrink: 0;
  }

  #fallback-msg {
    display: none; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); text-align: center;
    color: #444; font-size: 16px; line-height: 1.6;
  }
  #fallback-msg .accent { color: #FFD700; }

  /* Drag-and-drop overlay */
  #drop-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 100;
    border: 3px dashed #FFD700;
    flex-direction: column; align-items: center; justify-content: center;
    color: #FFD700; font-size: 20px;
  }
  #drop-overlay.active { display: flex; }

  /* Transcript label */
  .transcript-label {
    font-size: 11px; color: #555; margin-bottom: 4px;
    font-family: -apple-system, sans-serif;
  }

  /* Connection status indicator */
  #connection-status {
    display: none; padding: 4px 16px; background: #0a0a0a;
    border-bottom: 1px solid #1a1a1a; font-size: 11px;
    font-family: -apple-system, sans-serif; color: #555;
  }
  #connection-status.connected { color: #4a7a4a; }
  #connection-status.disconnected { color: #7a4a4a; }
  #top-toolbar {
    position: fixed; top: 8px; right: 8px; z-index: 9999;
    display: flex; align-items: center; gap: 6px;
  }
  #reload-btn {
    background: none; border: 1px solid #333; border-radius: 4px;
    color: #555; font-size: 12px; padding: 4px 10px; cursor: pointer;
    font-family: -apple-system, sans-serif; white-space: nowrap;
    min-height: 30px;
  }
  #reload-btn:hover { color: #aaa; border-color: #555; }

  /* Vocab debug panel */
  #vocab-debug {
    display: none; padding: 6px 16px; background: #0a0a0a;
    border-top: 1px solid #1a1a1a; font-size: 10px; line-height: 1.5;
    font-family: -apple-system, sans-serif; color: #555;
    max-height: 80px; overflow-y: auto;
  }
  #vocab-debug.active { display: block; }
  #vocab-debug .vocab-label { color: #666; margin-right: 4px; }
  #vocab-debug .vocab-core { color: #555; }
  #vocab-debug .vocab-pinned { color: #FFD700; }
  #vocab-debug .vocab-ephemeral { color: #4a7a9a; }
</style>
</head>
<body>
<div id="connection-status"></div>
<div id="top-toolbar">
<button id="reload-btn" onclick="reloadServer()" title="Restart AURYN server">reload</button>
</div>

<!-- CONTEXT ZONE: AURYN symbol + context petals -->
<div id="context-zone">
  <div id="petals-ring"></div>
  <div id="auryn-symbol" title="Select AURYN in dreamspace">
    <img src="AURYN.jpg" alt="AURYN">
  </div>
</div>

<!-- CHAT ZONE: messages + input -->
<div id="chat-zone">
  <div id="messages"></div>
  <div id="input-area">
    <div id="autocomplete"></div>
    <textarea id="input" rows="1" placeholder="Talk to AURYN... (@ to reference DreamNodes)" autofocus></textarea>
    <button id="mic-btn" title="Record voice">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
    <button id="stop-btn" title="Stop">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
    </button>
  </div>
</div>

<div id="vocab-debug"></div>
<div id="drop-overlay">Drop audio file to transcribe</div>
<div id="fallback-msg">
  Open in the <span class="accent">InterBrain</span> to chat with AURYN
</div>
<!-- Hidden link so html-loader resolves the font path to an app:// URL -->
<link id="font-resource" href="fonts/texgyretermes-regular.otf" rel="preload" as="font" type="font/otf" crossorigin style="display:none">

<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<script>
// ============================================================
// 1. STATE
// ============================================================
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const stopBtn = document.getElementById('stop-btn');
const micBtn = document.getElementById('mic-btn');
const fallbackEl = document.getElementById('fallback-msg');
const dropOverlay = document.getElementById('drop-overlay');
const connectionStatus = document.getElementById('connection-status');
const autocompleteEl = document.getElementById('autocomplete');
const petalsRing = document.getElementById('petals-ring');
const aurynSymbol = document.getElementById('auryn-symbol');

let conversation = [];
let isStreaming = false;
let currentRequestId = null;
let font = null;
let fontLoaded = false;
let aiBridgeReady = false;
let standaloneMode = false;

// Transcription state
let isRecording = false;
let mediaRecorder = null;
let transcriptionWs = null;
let transcriptMsg = null; // the active transcript message object

// Context state — DreamNodes loaded into context
let contextNodes = []; // array of { id, title, type, dreamTalkUrl, repoPath, absPath }

// Autocomplete state
let acVisible = false;
let acSelectedIndex = 0;
let acFilteredItems = [];
let acTriggerPos = -1; // cursor position where @ was typed

// DreamNode catalog — populated from InterBrain or dummy data
let dreamNodeCatalog = [];

const SYSTEM_PROMPT = `You are AURYN, the cultivation layer of DreamOS. Named after the Ouroboros amulet from The Neverending Story — "Do what you will."

You help users tend their knowledge garden: creating DreamNodes, weaving DreamSongs, discovering connections through semantic search, and nurturing visions from seeds to harvest. You speak with warmth and clarity, like a wise gardener who knows the soil intimately.

Keep responses concise and grounded. Use metaphor when it illuminates, not to obscure. Never use emojis. Respond in plain text with minimal markdown — use **bold** sparingly for emphasis, use bullet lists with dashes when listing items. Do not use headers.`;

// ============================================================
// 1b. DREAMNODE CATALOG
// ============================================================
// Request catalog from InterBrain via postMessage, fall back to
// scanning via CLI bridge, or use empty list.

// Mock catalog for testing — replaced by InterBrain response when in iframe
const MOCK_CATALOG = [
  { id: '53a3bb7a-3df8-4f36-af99-23787a8cec25', title: 'A U R Y N', type: 'dream', repoPath: 'AURYN', dreamTalkUrl: '' },
  { id: 'mock-interBrain', title: 'InterBrain', type: 'dream', repoPath: 'InterBrain', dreamTalkUrl: '' },
  { id: 'mock-prism', title: 'PRISM', type: 'dream', repoPath: 'PRISM', dreamTalkUrl: '' },
  { id: 'mock-dreamtalk', title: 'DreamTalk', type: 'dream', repoPath: 'DreamTalk', dreamTalkUrl: '' },
  { id: 'mock-ataraxia', title: 'A T A R A X I A', type: 'dream', repoPath: 'ATARAXIA', dreamTalkUrl: '' },
  { id: 'mock-project-liminality', title: 'Project Liminality', type: 'dream', repoPath: 'Project Liminality', dreamTalkUrl: '' },
  { id: 'mock-software-gardening', title: 'Software Gardening', type: 'dream', repoPath: 'Software Gardening', dreamTalkUrl: '' },
  { id: 'mock-david', title: 'David', type: 'dreamer', repoPath: 'David', dreamTalkUrl: '' },
  { id: 'mock-kronos', title: 'Kronos', type: 'dream', repoPath: 'Kronos', dreamTalkUrl: '' },
  { id: 'mock-songlines', title: 'Songlines', type: 'dream', repoPath: 'Songlines', dreamTalkUrl: '' },
  { id: 'mock-tutorial-system', title: 'Tutorial System', type: 'dream', repoPath: 'Tutorial System', dreamTalkUrl: '' },
  { id: 'mock-spring-launch', title: 'Spring Launch', type: 'dream', repoPath: 'Spring Launch', dreamTalkUrl: '' },
];

function requestDreamNodeCatalog() {
  if (isInIframe) {
    window.parent.postMessage({ type: 'dreamnode-catalog-request' }, '*');
  }
  // Use mock data immediately so autocomplete works for testing
  if (dreamNodeCatalog.length === 0) {
    setDreamNodeCatalog(MOCK_CATALOG);
  }
}

function setDreamNodeCatalog(nodes) {
  dreamNodeCatalog = nodes;
  console.log('[AURYN] DreamNode catalog loaded:', nodes.length, 'nodes');
}

function findCatalogNode(folder, title, uuid) {
  // Match by UUID first, then folder/repoPath, then title
  if (uuid) {
    const byUuid = dreamNodeCatalog.find(n => n.id === uuid);
    if (byUuid) return byUuid;
  }
  if (folder) {
    const byFolder = dreamNodeCatalog.find(n =>
      n.repoPath === folder || n.repoPath === folder.replace(/ /g, '')
    );
    if (byFolder) return byFolder;
  }
  if (title) {
    const byTitle = dreamNodeCatalog.find(n =>
      n.title.toLowerCase() === title.toLowerCase()
    );
    if (byTitle) return byTitle;
  }
  // If not in catalog, create a temporary entry so the petal still shows
  if (folder || title) {
    return {
      id: uuid || `detected-${(folder || title).toLowerCase().replace(/\s+/g, '-')}`,
      title: title || folder,
      type: 'dream',
      repoPath: folder || '',
      dreamTalkUrl: ''
    };
  }
  return null;
}

// ============================================================
// 1c. CONTEXT MANAGEMENT (petals)
// ============================================================
function addToContext(node) {
  if (contextNodes.find(n => n.id === node.id)) return; // already in context
  contextNodes.push(node);
  renderPetals();
  updateSendButton();
}

function removeFromContext(nodeId) {
  contextNodes = contextNodes.filter(n => n.id !== nodeId);
  renderPetals();
  updateSendButton();
}

function renderPetals() {
  petalsRing.innerHTML = '';
  const count = contextNodes.length;
  if (count === 0) return;

  const radius = 82; // distance from center

  contextNodes.forEach((node, i) => {
    const angle = (i / count) * Math.PI * 2 - Math.PI / 2; // start from top
    const x = Math.cos(angle) * radius - 26; // 26 = half petal width
    const y = Math.sin(angle) * radius - 26;

    const petal = document.createElement('div');
    petal.className = 'petal' + (node.type === 'dreamer' ? ' dreamer' : '');
    petal.style.transform = `translate(${x}px, ${y}px)`;
    petal.title = node.title;

    if (node.dreamTalkUrl) {
      const img = document.createElement('img');
      img.src = node.dreamTalkUrl;
      img.alt = node.title;
      img.onerror = () => {
        img.remove();
        const initials = document.createElement('div');
        initials.className = 'petal-initials';
        initials.textContent = node.title.slice(0, 2).toUpperCase();
        petal.insertBefore(initials, petal.firstChild);
      };
      petal.appendChild(img);
    } else {
      const initials = document.createElement('div');
      initials.className = 'petal-initials';
      initials.textContent = node.title.slice(0, 2).toUpperCase();
      petal.appendChild(initials);
    }

    // Label
    const label = document.createElement('div');
    label.className = 'petal-label';
    label.textContent = node.title;
    petal.appendChild(label);

    // Remove button
    const removeBtn = document.createElement('button');
    removeBtn.className = 'petal-remove';
    removeBtn.textContent = '\u00d7';
    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      removeFromContext(node.id);
    });
    petal.appendChild(removeBtn);

    // Click to select in dreamspace
    petal.addEventListener('click', () => selectInDreamspace(node.id));

    petalsRing.appendChild(petal);
  });
}

function selectInDreamspace(nodeId) {
  // postMessage to InterBrain parent to select this node
  if (isInIframe) {
    window.parent.postMessage({
      type: 'select-dreamnode',
      nodeId: nodeId
    }, '*');
  }
  console.log('[AURYN] Select in dreamspace:', nodeId);
}

// AURYN symbol click → select AURYN itself
aurynSymbol.addEventListener('click', () => {
  selectInDreamspace('53a3bb7a-3df8-4f36-af99-23787a8cec25'); // AURYN's UUID
});

// ============================================================
// 1d. AUTOCOMPLETE
// ============================================================
function showAutocomplete(query) {
  const q = query.toLowerCase();
  acFilteredItems = dreamNodeCatalog.filter(n =>
    n.title.toLowerCase().includes(q)
  ).slice(0, 12);

  if (acFilteredItems.length === 0) {
    hideAutocomplete();
    return;
  }

  acSelectedIndex = 0;
  acVisible = true;
  renderAutocomplete();
  autocompleteEl.style.display = 'block';
}

function hideAutocomplete() {
  acVisible = false;
  acTriggerPos = -1;
  autocompleteEl.style.display = 'none';
  autocompleteEl.innerHTML = '';
}

function renderAutocomplete() {
  autocompleteEl.innerHTML = '';
  acFilteredItems.forEach((node, i) => {
    const item = document.createElement('div');
    item.className = 'ac-item' + (i === acSelectedIndex ? ' selected' : '');

    // Thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'ac-thumb' + (node.type === 'dreamer' ? ' dreamer' : '');
    if (node.dreamTalkUrl) {
      const img = document.createElement('img');
      img.src = node.dreamTalkUrl;
      img.onerror = () => {
        img.remove();
        const init = document.createElement('div');
        init.className = 'ac-initials';
        init.textContent = node.title.slice(0, 2).toUpperCase();
        thumb.appendChild(init);
      };
      thumb.appendChild(img);
    } else {
      const init = document.createElement('div');
      init.className = 'ac-initials';
      init.textContent = node.title.slice(0, 2).toUpperCase();
      thumb.appendChild(init);
    }
    item.appendChild(thumb);

    // Title
    const title = document.createElement('div');
    title.className = 'ac-title';
    title.textContent = node.title;
    item.appendChild(title);

    // Type badge
    const type = document.createElement('div');
    type.className = 'ac-type';
    type.textContent = node.type === 'dreamer' ? 'person' : 'idea';
    item.appendChild(type);

    item.addEventListener('click', () => acceptAutocomplete(i));
    item.addEventListener('mouseenter', () => {
      acSelectedIndex = i;
      renderAutocomplete();
    });

    autocompleteEl.appendChild(item);
  });

  // Scroll selected into view
  const selectedEl = autocompleteEl.querySelector('.ac-item.selected');
  if (selectedEl) selectedEl.scrollIntoView({ block: 'nearest' });
}

function acceptAutocomplete(index) {
  const node = acFilteredItems[index];
  if (!node) return;

  // Replace @query with the title
  const text = inputEl.value;
  const before = text.slice(0, acTriggerPos);
  const after = text.slice(inputEl.selectionStart);
  inputEl.value = before + node.title + ' ' + after;
  inputEl.selectionStart = inputEl.selectionEnd = before.length + node.title.length + 1;

  // Add to context
  addToContext(node);

  hideAutocomplete();
  inputEl.focus();
}

const instanceId = crypto.randomUUID();

// postMessage handler for iframe AI bridge
window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || !d.type) return;

  if (d.type === 'ai-bridge-ready') {
    if (d.instanceId && d.instanceId !== instanceId) return;
    aiBridgeReady = true;
    console.log('[AURYN] AI bridge ready via iframe (v' + d.version + ')');
    fallbackEl.style.display = 'none';
    document.getElementById('chat-zone').style.display = '';
    document.getElementById('context-zone').style.display = '';
    // Request catalog once bridge is ready
    requestDreamNodeCatalog();
    return;
  }

  // DreamNode catalog response from InterBrain
  if (d.type === 'dreamnode-catalog-response') {
    setDreamNodeCatalog(d.catalog || []);
    return;
  }

  if (d.requestId !== currentRequestId) return;

  if (d.type === 'ai-inference-stream-chunk') {
    appendChunk(d.chunk);
  } else if (d.type === 'tool-call-start') {
    handleToolCallStart(d.tool_name, d.tool_input);
  } else if (d.type === 'tool-call-result') {
    handleToolCallResult(d.tool_name, d.result);
  } else if (d.type === 'ai-inference-stream-done') {
    finishStream();
  } else if (d.type === 'ai-inference-stream-error') {
    finishStream(d.error);
  }
});

// Check if we're inside an iframe (InterBrain) or standalone
const isInIframe = window.parent !== window;

if (isInIframe) {
  fallbackEl.style.display = 'block';
  document.getElementById('chat-zone').style.display = 'none';
  document.getElementById('context-zone').style.display = 'none';

  window.parent.postMessage({ type: 'ai-bridge-probe', instanceId }, '*');
  setTimeout(() => {
    if (!aiBridgeReady) {
      console.log('[AURYN] No AI bridge — showing fallback');
    }
  }, 500);
} else {
  // Standalone mode — connect to AI bridge WebSocket server
  standaloneMode = true;
  fallbackEl.style.display = 'none';
  document.getElementById('chat-zone').style.display = '';
  document.getElementById('context-zone').style.display = '';
  connectionStatus.style.display = 'block';
  connectionStatus.textContent = 'Connecting to InterBrain...';
  connectionStatus.className = 'disconnected';
  console.log('[AURYN] Standalone mode — connecting to AI bridge WebSocket');
  requestDreamNodeCatalog();
  connectAIBridgeWs();
}

function sendStreamRequest(messages) {
  if (standaloneMode) {
    sendWsBridgeRequest(messages);
    return;
  }
  currentRequestId = crypto.randomUUID();
  window.parent.postMessage({
    type: 'ai-inference-stream-request',
    requestId: currentRequestId,
    messages,
    complexity: 'standard'
  }, '*');
}

function cancelStream() {
  if (standaloneMode) {
    if (currentRequestId && aiBridgeWs && aiBridgeWs.readyState === WebSocket.OPEN) {
      aiBridgeWs.send(JSON.stringify({
        type: 'ai-inference-stream-cancel',
        requestId: currentRequestId
      }));
    }
    finishStream();
    return;
  }
  if (currentRequestId) {
    window.parent.postMessage({
      type: 'ai-inference-stream-cancel',
      requestId: currentRequestId
    }, '*');
  }
  finishStream();
}

// ============================================================
// 2b. AI BRIDGE WEBSOCKET (standalone mode)
// ============================================================
// Connects to the InterBrain plugin's AI Bridge WebSocket server.
// Same protocol as the iframe postMessage bridge — the plugin
// routes to whatever LLM provider is configured in settings.

const AI_BRIDGE_PORT = 27182;
let aiBridgeWs = null;

function getAIBridgeWsUrl() {
  // When served by server.py, the InterBrain is on the same machine
  // Use the page's hostname (works for both localhost and Tailscale IP)
  const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const host = window.location.hostname || 'localhost';
  return `${wsProtocol}//${host}:${AI_BRIDGE_PORT}`;
}

function connectAIBridgeWs() {
  const url = getAIBridgeWsUrl();
  console.log('[AURYN] Connecting AI bridge WS:', url);

  try {
    aiBridgeWs = new WebSocket(url);

    aiBridgeWs.onopen = () => {
      console.log('[AURYN] AI bridge WS connected');
      connectionStatus.textContent = 'Connected to InterBrain';
      connectionStatus.className = 'connected';
      // Hide after 3s if connected
      setTimeout(() => {
        if (aiBridgeWs && aiBridgeWs.readyState === WebSocket.OPEN) {
          connectionStatus.style.display = 'none';
        }
      }, 3000);
    };

    aiBridgeWs.onmessage = (e) => {
      const data = JSON.parse(e.data);

      if (data.type === 'ai-bridge-ready') {
        console.log('[AURYN] AI bridge ready via WebSocket (v' + data.version + ')');
        return;
      }

      if (data.requestId !== currentRequestId) return;

      if (data.type === 'ai-inference-stream-chunk') {
        appendChunk(data.chunk);
      } else if (data.type === 'tool-call-start') {
        handleToolCallStart(data.tool_name, data.tool_input);
      } else if (data.type === 'tool-call-result') {
        handleToolCallResult(data.tool_name, data.result);
      } else if (data.type === 'ai-inference-stream-done') {
        finishStream();
      } else if (data.type === 'ai-inference-stream-error') {
        finishStream(data.error);
      }
    };

    aiBridgeWs.onclose = () => {
      console.log('[AURYN] AI bridge WS disconnected');
      aiBridgeWs = null;
      connectionStatus.style.display = 'block';
      connectionStatus.textContent = 'Disconnected from InterBrain — reconnecting...';
      connectionStatus.className = 'disconnected';
      setTimeout(connectAIBridgeWs, 3000);
    };

    aiBridgeWs.onerror = () => {
      console.log('[AURYN] AI bridge WS error');
    };
  } catch (e) {
    console.log('[AURYN] Cannot connect to AI bridge:', e.message);
    connectionStatus.style.display = 'block';
    connectionStatus.textContent = 'Cannot reach InterBrain';
    connectionStatus.className = 'disconnected';
    setTimeout(connectAIBridgeWs, 5000);
  }
}

function sendWsBridgeRequest(messages) {
  if (!aiBridgeWs || aiBridgeWs.readyState !== WebSocket.OPEN) {
    finishStream('Not connected to InterBrain. Make sure Obsidian is running.');
    return;
  }

  currentRequestId = crypto.randomUUID();
  aiBridgeWs.send(JSON.stringify({
    type: 'ai-inference-stream-request',
    requestId: currentRequestId,
    messages,
    complexity: 'standard'
  }));
}

// ============================================================
// 4. MARKDOWN RENDERING
// ============================================================
function renderMarkdown(text) {
  // Convert markdown to HTML
  let html = escapeHtml(text);

  // Bold: **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic: *text*
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code: `text`
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Split into paragraphs on double newline
  const blocks = html.split('\n\n');
  const rendered = blocks.map(block => {
    block = block.trim();
    if (!block) return '';

    // Check if block is a list (lines starting with - )
    const lines = block.split('\n');
    const isList = lines.every(l => /^[-]\s/.test(l.trim()) || !l.trim());
    if (isList) {
      // Render as dash-prefixed lines to match SVG animation exactly
      const items = lines
        .filter(l => l.trim())
        .map(l => '<div class="list-item">' + l.trim() + '</div>')
        .join('');
      return '<div class="list-block">' + items + '</div>';
    }

    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('');

  return rendered;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ============================================================
// 5. MARKDOWN STREAM PARSER
// ============================================================
function createMarkdownParser() {
  let buf = '';
  let bold = false;
  let italic = false;
  let emitted = 0;

  return {
    feed(chunk) {
      buf += chunk;
      const tokens = [];
      let i = 0;

      while (i < buf.length) {
        if (buf[i] === '*' && buf[i + 1] === '*') {
          if (i + 1 < buf.length) {
            bold = !bold;
            i += 2;
            continue;
          } else {
            break;
          }
        }
        if (buf[i] === '*' && buf[i + 1] !== '*') {
          italic = !italic;
          i += 1;
          continue;
        }
        if (buf[i] === '*' && i === buf.length - 1) {
          break;
        }
        if (buf[i] === '`') {
          i++;
          while (i < buf.length && buf[i] !== '`') {
            tokens.push({ char: buf[i], bold: false, italic: false, code: true });
            i++;
          }
          if (i < buf.length) i++;
          continue;
        }

        tokens.push({ char: buf[i], bold, italic, code: false });
        i++;
      }

      buf = buf.slice(i);
      const newTokens = tokens.slice(0);
      return newTokens;
    },

    flush() {
      const tokens = [];
      for (const ch of buf) {
        if (ch !== '*' && ch !== '`') {
          tokens.push({ char: ch, bold, italic, code: false });
        }
      }
      buf = '';
      return tokens;
    }
  };
}

// ============================================================
// 6. WRITE ANIMATION ENGINE
// ============================================================
const STROKE_DURATION = 0.5;
const FILL_DELAY = 0.1;
const CASCADE_DELAY = 0.0075;
const ANIM_FONT_SIZE = 20;
const ANIM_LINE_HEIGHT = ANIM_FONT_SIZE * 1.6;
const PARAGRAPH_GAP = ANIM_FONT_SIZE * 0.6;
const BOLD_STROKE_WIDTH = 2.5;
const NORMAL_STROKE_WIDTH = 1.5;
const ITALIC_SKEW = -12;

let activeMsg = null;

function createAnimatedMessage(cssClass) {
  const div = document.createElement('div');
  div.className = 'msg ' + cssClass;

  const textLayer = document.createElement('div');
  textLayer.className = 'text-layer';
  div.appendChild(textLayer);

  messagesEl.appendChild(div);

  const msg = {
    el: div,
    textLayer: textLayer,
    fullText: '',
    mdParser: createMarkdownParser(),
    svgOverlay: null,
    svgEl: null,
    xOffset: 0,
    lineData: [],
    animatedChars: 0,
    wordBuffer: [],
    pendingNewlines: 0,
    strokeColor: cssClass === 'transcript' ? '#b0b0b0' : '#fff',
    fillColor: cssClass === 'transcript' ? '#b0b0b0' : '#fff',
  };

  if (fontLoaded) {
    textLayer.style.visibility = 'hidden';

    const overlay = document.createElement('div');
    overlay.className = 'svg-overlay';
    const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgEl.style.overflow = 'visible';
    overlay.appendChild(svgEl);
    div.appendChild(overlay);

    msg.svgOverlay = overlay;
    msg.svgEl = svgEl;
    startNewLineFor(msg);
  }

  scrollToBottom();
  return msg;
}

function createAssistantMessage() {
  activeMsg = createAnimatedMessage('assistant');
  return activeMsg.el;
}

function getContainerWidthFor(msg) {
  if (!msg || !msg.el) return 500;
  return msg.el.clientWidth || 500;
}

function getContainerWidth() {
  return getContainerWidthFor(activeMsg);
}

function startNewLineFor(msg, extraGap) {
  if (!msg) return;
  let newY;
  if (msg.lineData.length === 0) {
    newY = ANIM_FONT_SIZE;
  } else {
    const prevY = msg.lineData[msg.lineData.length - 1].y;
    newY = prevY + ANIM_LINE_HEIGHT + (extraGap || 0);
  }
  msg.lineData.push({ y: newY });
  msg.xOffset = 0;
}

function startNewLine(extraGap) {
  startNewLineFor(activeMsg, extraGap);
}

function measureTokens(tokens) {
  if (!font) return tokens.length * ANIM_FONT_SIZE * 0.5;
  const scale = ANIM_FONT_SIZE / font.unitsPerEm;
  let w = 0;
  for (const tok of tokens) {
    const g = font.charToGlyph(tok.char);
    w += (g.advanceWidth ?? ANIM_FONT_SIZE * 0.6) * scale;
  }
  return w;
}

function flushWordFor(msg) {
  if (!msg || msg.wordBuffer.length === 0) return;

  const tokens = msg.wordBuffer;
  const containerWidth = getContainerWidthFor(msg);
  const wordWidth = measureTokens(tokens);

  if (msg.xOffset > 0 && msg.xOffset + wordWidth > containerWidth) {
    startNewLineFor(msg);
  }

  for (const tok of tokens) {
    renderCharToSVGFor(msg, tok.char, msg.animatedChars, tok.bold, tok.italic);
    msg.animatedChars++;
  }

  msg.wordBuffer = [];
}

function flushWord() {
  flushWordFor(activeMsg);
}

function renderCharToSVGFor(msg, char, charIndex, isBold, isItalic) {
  if (!font || !msg || !msg.svgEl) return;

  const svgEl = msg.svgEl;
  const scale = ANIM_FONT_SIZE / font.unitsPerEm;
  const glyph = font.charToGlyph(char);
  const advance = (glyph.advanceWidth ?? ANIM_FONT_SIZE * 0.6) * scale;

  const x = msg.xOffset;
  const y = msg.lineData[msg.lineData.length - 1].y;

  const path = glyph.getPath(x, y, ANIM_FONT_SIZE);
  const pathStr = path.toSVG(2);
  const dMatch = pathStr.match(/d="([^"]+)"/);

  if (dMatch && char !== ' ') {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

    if (isItalic) {
      const skewRad = ITALIC_SKEW * Math.PI / 180;
      const yCenter = y - ANIM_FONT_SIZE * 0.4;
      const xShift = -yCenter * Math.tan(skewRad);
      g.setAttribute('transform', `translate(${xShift}, 0) skewX(${ITALIC_SKEW})`);
    }

    const tempPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    tempPath.setAttribute('d', dMatch[1]);
    svgEl.appendChild(tempPath);
    const pathLength = tempPath.getTotalLength() || 100;
    svgEl.removeChild(tempPath);

    const delay = charIndex * CASCADE_DELAY;
    const strokeWidth = isBold ? BOLD_STROKE_WIDTH : NORMAL_STROKE_WIDTH;

    const strokePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    strokePath.setAttribute('d', dMatch[1]);
    strokePath.setAttribute('class', 'char-path-stroke');
    strokePath.style.stroke = msg.strokeColor;
    strokePath.style.strokeWidth = strokeWidth;
    strokePath.style.strokeDasharray = pathLength;
    strokePath.style.strokeDashoffset = pathLength;
    strokePath.style.animation =
      `stroke-draw ${STROKE_DURATION}s ${delay}s ease-in-out forwards, ` +
      `stroke-fade 0.3s ${delay + STROKE_DURATION + FILL_DELAY}s ease-out forwards`;
    g.appendChild(strokePath);

    const fillPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    fillPath.setAttribute('d', dMatch[1]);
    fillPath.setAttribute('class', 'char-path-fill');
    fillPath.style.fill = msg.fillColor;
    fillPath.style.animation =
      `fill-reveal 0.3s ${delay + STROKE_DURATION * 0.6}s ease-in forwards`;
    g.appendChild(fillPath);

    svgEl.appendChild(g);
  }

  msg.xOffset += advance;

  const totalHeight = msg.lineData.length * ANIM_LINE_HEIGHT + ANIM_FONT_SIZE * 0.5;
  const containerWidth = getContainerWidthFor(msg);
  svgEl.setAttribute('viewBox', `0 0 ${containerWidth} ${totalHeight}`);
  svgEl.style.height = totalHeight + 'px';
}

function renderCharToSVG(char, charIndex, isBold, isItalic) {
  renderCharToSVGFor(activeMsg, char, charIndex, isBold, isItalic);
}

function processTokensFor(msg, tokens) {
  if (!msg) return;

  for (const tok of tokens) {
    if (tok.char === '\n') {
      flushWordFor(msg);
      msg.pendingNewlines++;
    } else {
      if (msg.pendingNewlines > 0) {
        if (msg.pendingNewlines >= 2) {
          startNewLineFor(msg, PARAGRAPH_GAP);
        } else {
          startNewLineFor(msg);
        }
        msg.pendingNewlines = 0;
      }

      if (tok.char === ' ') {
        flushWordFor(msg);
        renderCharToSVGFor(msg, ' ', msg.animatedChars, false, false);
        msg.animatedChars++;
      } else {
        msg.wordBuffer.push(tok);
      }
    }
  }
}

function processTokens(tokens) {
  processTokensFor(activeMsg, tokens);
}

function appendChunkTo(msg, chunk) {
  if (!msg) return;
  msg.fullText += chunk;

  msg.textLayer.innerHTML = renderMarkdown(msg.fullText);

  if (fontLoaded && msg.svgEl) {
    const tokens = msg.mdParser.feed(chunk);
    processTokensFor(msg, tokens);
  }

  scrollToBottom();
}

function appendChunk(chunk) {
  appendChunkTo(activeMsg, chunk);
}

function handleToolCallStart(toolName, toolInput) {
  const block = document.createElement('div');
  block.className = 'msg assistant tool-call-block';
  block.dataset.toolName = toolName;

  const nameEl = document.createElement('div');
  nameEl.className = 'tool-name';
  nameEl.textContent = '[' + toolName + ']';
  block.appendChild(nameEl);

  const inputDetails = document.createElement('details');
  const inputSummary = document.createElement('summary');
  inputSummary.textContent = 'Input';
  const inputPre = document.createElement('pre');
  inputPre.textContent = JSON.stringify(toolInput, null, 2);
  inputDetails.appendChild(inputSummary);
  inputDetails.appendChild(inputPre);
  block.appendChild(inputDetails);

  messagesEl.appendChild(block);
  scrollToBottom();
}

function handleToolCallResult(toolName, result) {
  // Find the most recent tool-call-block for this tool
  const blocks = messagesEl.querySelectorAll('.tool-call-block[data-tool-name="' + toolName + '"]');
  const block = blocks[blocks.length - 1];
  if (!block) return;

  const resultDetails = document.createElement('details');
  resultDetails.open = true;
  const resultSummary = document.createElement('summary');
  resultSummary.textContent = 'Result';
  const resultPre = document.createElement('pre');
  resultPre.textContent = result || '(no output)';
  resultDetails.appendChild(resultSummary);
  resultDetails.appendChild(resultPre);
  block.appendChild(resultDetails);
  scrollToBottom();
}

function finishAnimatedMessage(msg, error) {
  if (!msg) return;

  if (msg.mdParser) {
    const remaining = msg.mdParser.flush();
    processTokensFor(msg, remaining);
  }
  if (msg.wordBuffer && msg.wordBuffer.length > 0) {
    flushWordFor(msg);
  }

  if (error) {
    const errEl = document.createElement('div');
    errEl.style.color = '#8B0000';
    errEl.style.fontSize = '13px';
    errEl.style.marginTop = '8px';
    errEl.textContent = 'Error: ' + error;
    msg.el.appendChild(errEl);
  }

  if (msg.svgOverlay && msg.svgEl) {
    const lastCharDelay = msg.animatedChars * CASCADE_DELAY;
    const totalAnimTime = (lastCharDelay + STROKE_DURATION + FILL_DELAY + 0.5) * 1000;

    setTimeout(() => {
      if (!msg.el) return;
      msg.svgOverlay.style.transition = 'opacity 0.4s ease-out';
      msg.svgOverlay.style.opacity = '0';
      msg.textLayer.style.visibility = 'visible';
      msg.textLayer.style.opacity = '0';
      msg.textLayer.style.transition = 'opacity 0.4s ease-in';
      msg.textLayer.offsetHeight;
      msg.textLayer.style.opacity = '1';

      setTimeout(() => {
        if (msg.svgOverlay && msg.svgOverlay.parentNode) {
          msg.svgOverlay.remove();
        }
      }, 500);
    }, totalAnimTime);
  } else {
    msg.textLayer.style.visibility = 'visible';
  }
}

function finishStream(error) {
  isStreaming = false;
  currentRequestId = null;
  sendBtn.style.display = '';
  stopBtn.style.display = 'none';
  updateSendButton();

  if (activeMsg) {
    finishAnimatedMessage(activeMsg, error);

    if (activeMsg.fullText) {
      conversation.push({ role: 'assistant', content: activeMsg.fullText });
    }

    activeMsg = null;
  }

  inputEl.focus();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

// ============================================================
// 7. CHAT LOGIC
// ============================================================
function sendMessage(text) {
  if (!text) text = inputEl.value.trim();
  if (!text || isStreaming) return;

  // Hide autocomplete on send
  hideAutocomplete();

  // Check for /do command — route to Claude Code
  if (text.startsWith('/do ')) {
    const doPrompt = text.slice(4).trim();
    if (doPrompt) {
      // Show user message
      const userMsg = document.createElement('div');
      userMsg.className = 'msg user';
      userMsg.textContent = text;
      messagesEl.appendChild(userMsg);
      conversation.push({ role: 'user', content: text });
      inputEl.value = '';
      inputEl.style.height = 'auto';
      updateSendButton();
      startClaudeCode(doPrompt);
      return;
    }
  }

  const userMsg = document.createElement('div');
  userMsg.className = 'msg user';
  userMsg.textContent = text;
  messagesEl.appendChild(userMsg);

  conversation.push({ role: 'user', content: text });

  inputEl.value = '';
  inputEl.style.height = 'auto';
  updateSendButton();

  const messages = [
    { role: 'system', content: SYSTEM_PROMPT },
    ...conversation
  ];

  isStreaming = true;
  sendBtn.style.display = 'none';
  stopBtn.style.display = 'flex';

  createAssistantMessage();
  sendStreamRequest(messages);
  scrollToBottom();
}

// ============================================================
// 7b. VOCAB DEBUG
// ============================================================
function renderVocabDebug(data) {
  const el = document.getElementById('vocab-debug');
  const tag = (cls, items) => items.length
    ? `<span class="vocab-label">${cls}:</span>` +
      items.map(t => `<span class="vocab-${cls}">${t}</span>`).join(', ') + ' '
    : '';
  el.innerHTML =
    tag('core', data.core || []) +
    tag('pinned', data.pinned || []) +
    tag('ephemeral', data.ephemeral || []);
  el.classList.add('active');
}

// ============================================================
// 8. TRANSCRIPTION (VOICE)
// ============================================================
function getTranscriptionWsUrl() {
  if (standaloneMode) {
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    return `${wsProtocol}//${window.location.host}/ws/transcribe`;
  }
  return `ws://localhost:3002/ws/transcribe`;
}

function connectTranscriptionWs() {
  const url = getTranscriptionWsUrl();
  console.log('[AURYN] Connecting transcription WS:', url);

  try {
    transcriptionWs = new WebSocket(url);

    transcriptionWs.onopen = () => {
      console.log('[AURYN] Transcription WS connected');
      micBtn.disabled = false;
      micBtn.title = 'Record voice';
    };

    transcriptionWs.onmessage = (e) => {
      const data = JSON.parse(e.data);

      if (data.type === 'transcript_chunk') {
        // Insert at cursor position in the textarea
        const start = inputEl.selectionStart;
        const end = inputEl.selectionEnd;
        const val = inputEl.value;
        inputEl.value = val.substring(0, start) + data.text + val.substring(end);
        inputEl.selectionStart = inputEl.selectionEnd = start + data.text.length;
        inputEl.style.height = 'auto';
        inputEl.style.height = inputEl.scrollHeight + 'px';
        inputEl.focus();
      } else if (data.type === 'dreamnode_detected') {
        // A DreamNode name was recognized in the transcript — add to context petals
        const node = findCatalogNode(data.folder, data.title, data.uuid);
        if (node) {
          if (data.path) node.absPath = data.path;
          addToContext(node);
          console.log('[AURYN] DreamNode detected in voice:', node.title);
        }
      } else if (data.type === 'stream_ended') {
        // Leave text in the input field for editing — don't auto-send
        document.getElementById('vocab-debug').classList.remove('active');
        inputEl.focus();
        inputEl.style.height = 'auto';
        inputEl.style.height = inputEl.scrollHeight + 'px';
        // Add any pinned DreamNodes that weren't already in context
        if (data.pinned_dreamnodes && Array.isArray(data.pinned_dreamnodes)) {
          for (const folder of data.pinned_dreamnodes) {
            const node = findCatalogNode(folder);
            if (node) addToContext(node);
          }
        }
      } else if (data.type === 'vocab_update') {
        renderVocabDebug(data);
      } else if (data.type === 'session_started') {
        console.log('[AURYN] Transcription session:', data.session_id);
        // Show vocab debug panel during transcription
        document.getElementById('vocab-debug').classList.add('active');
      }
    };

    transcriptionWs.onclose = () => {
      console.log('[AURYN] Transcription WS disconnected');
      micBtn.disabled = true;
      micBtn.title = 'Transcription server unavailable';
      transcriptionWs = null;
      setTimeout(connectTranscriptionWs, 5000);
    };

    transcriptionWs.onerror = () => {
      console.log('[AURYN] Transcription WS error');
    };
  } catch (e) {
    console.log('[AURYN] Cannot connect to transcription server:', e.message);
    micBtn.disabled = true;
    micBtn.title = 'Transcription server unavailable';
  }
}

async function startRecording() {
  if (!transcriptionWs || transcriptionWs.readyState !== WebSocket.OPEN) {
    console.log('[AURYN] No transcription server');
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 }
    });

    transcriptionWs.send(JSON.stringify({ type: 'start_stream' }));

    mediaRecorder = new MediaRecorder(stream, {
      mimeType: 'audio/webm;codecs=opus'
    });

    mediaRecorder.ondataavailable = async (e) => {
      if (e.data.size > 0 && transcriptionWs && transcriptionWs.readyState === WebSocket.OPEN) {
        const buffer = await e.data.arrayBuffer();
        transcriptionWs.send(buffer);
      }
    };

    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(track => track.stop());
      if (transcriptionWs && transcriptionWs.readyState === WebSocket.OPEN) {
        transcriptionWs.send(JSON.stringify({ type: 'end_stream' }));
      }
    };

    inputEl.focus();
    mediaRecorder.start(500);
    isRecording = true;
    micBtn.classList.add('recording');
    micBtn.title = 'Stop recording';

    scrollToBottom();
  } catch (err) {
    console.error('[AURYN] Mic error:', err);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording = false;
  micBtn.classList.remove('recording');
  micBtn.title = 'Record voice';
}

function finishRecording(fullText) {
  // Text is already in the textarea — just focus for editing
  inputEl.focus();
  inputEl.style.height = 'auto';
  inputEl.style.height = inputEl.scrollHeight + 'px';
}

// ============================================================
// 9. DRAG AND DROP AUDIO
// ============================================================
let dragCounter = 0;

document.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  if (hasAudioFile(e)) {
    dropOverlay.classList.add('active');
  }
});

document.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    dropOverlay.classList.remove('active');
  }
});

document.addEventListener('dragover', (e) => {
  e.preventDefault();
});

document.addEventListener('drop', async (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove('active');

  const files = [...e.dataTransfer.files].filter(f =>
    f.type.startsWith('audio/') ||
    /\.(webm|mp3|wav|m4a|ogg|mp4|aac|flac)$/i.test(f.name)
  );

  if (files.length === 0) return;

  for (const file of files) {
    await transcribeFile(file);
  }
});

function hasAudioFile(e) {
  if (e.dataTransfer.items) {
    for (const item of e.dataTransfer.items) {
      if (item.kind === 'file' && (item.type.startsWith('audio/') || item.type.startsWith('video/'))) {
        return true;
      }
    }
  }
  return true;
}

async function transcribeFile(file) {
  const label = document.createElement('div');
  label.className = 'transcript-label';
  label.textContent = `transcribing ${file.name}...`;
  messagesEl.appendChild(label);

  const msg = createAnimatedMessage('transcript');
  appendChunkTo(msg, 'Processing audio...');
  scrollToBottom();

  const uploadUrl = standaloneMode
    ? '/upload/audio'
    : 'http://localhost:3002/upload/audio';

  try {
    const form = new FormData();
    form.append('file', file, file.name);

    const resp = await fetch(uploadUrl, { method: 'POST', body: form });
    const data = await resp.json();

    msg.fullText = '';
    msg.textLayer.innerHTML = '';
    if (msg.svgEl) {
      while (msg.svgEl.firstChild) msg.svgEl.removeChild(msg.svgEl.firstChild);
      msg.animatedChars = 0;
      msg.lineData = [];
      msg.xOffset = 0;
      msg.mdParser = createMarkdownParser();
      startNewLineFor(msg);
    }

    if (data.text) {
      appendChunkTo(msg, data.text);
      label.textContent = `transcribed: ${file.name}`;
      finishAnimatedMessage(msg);

      setTimeout(() => { sendMessage(data.text.trim()); }, 800);
    } else if (data.error) {
      label.textContent = `failed: ${file.name}`;
      appendChunkTo(msg, data.error);
      finishAnimatedMessage(msg, data.error);
    }
  } catch (err) {
    label.textContent = `error: ${file.name}`;
    finishAnimatedMessage(msg, err.message);
  }
}

// 9b. KNOWLEDGE GARDENING
// ============================================================

const SEND_ICON = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';
const GARDEN_ICON = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c4.97 0 9-4.03 9-9-4.97 0-9 4.03-9 9zM5.6 10.25c0 1.38 1.12 2.5 2.5 2.5.53 0 1.01-.16 1.42-.44l-.02.19c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5l-.02-.19c.4.28.89.44 1.42.44 1.38 0 2.5-1.12 2.5-2.5 0-1-.59-1.85-1.43-2.25.84-.4 1.43-1.25 1.43-2.25 0-1.38-1.12-2.5-2.5-2.5-.53 0-1.01.16-1.42.44l.02-.19C14.5 2.12 13.38 1 12 1S9.5 2.12 9.5 3.5l.02.19c-.4-.28-.89-.44-1.42-.44-1.38 0-2.5 1.12-2.5 2.5 0 1 .59 1.85 1.43 2.25-.84.4-1.43 1.25-1.43 2.25zM12 5.5c1.38 0 2.5 1.12 2.5 2.5s-1.12 2.5-2.5 2.5S9.5 9.38 9.5 8s1.12-2.5 2.5-2.5zM3 13c0 4.97 4.03 9 9 9-4.97 0-9-4.03-9-9z"/></svg>';

let gardenWs = null;
let isGardening = false;

function updateSendButton() {
  const hasText = inputEl.value.trim().length > 0;
  const hasContext = contextNodes.length > 0;
  if (!hasText && hasContext && !isStreaming && !isGardening) {
    sendBtn.innerHTML = GARDEN_ICON;
    sendBtn.classList.add('garden-mode');
    sendBtn.title = 'Garden — route insights to DreamNodes';
    sendBtn.disabled = false;
  } else {
    sendBtn.innerHTML = SEND_ICON;
    sendBtn.classList.remove('garden-mode');
    sendBtn.title = 'Send';
    sendBtn.disabled = isStreaming;
  }
}

function getGardenWsUrl() {
  const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${wsProtocol}//${window.location.host}/ws/garden`;
}

function startGardening() {
  if (isGardening || conversation.length === 0) return;
  if (contextNodes.length === 0) return;

  isGardening = true;
  sendBtn.disabled = true;

  // Show gardening status in chat
  const statusMsg = document.createElement('div');
  statusMsg.className = 'msg assistant';
  statusMsg.id = 'garden-status';
  statusMsg.textContent = 'Gardening...';
  messagesEl.appendChild(statusMsg);
  scrollToBottom();

  try {
    const ws = new WebSocket(getGardenWsUrl());
    gardenWs = ws;

    ws.onopen = () => {
      // Send the full conversation + context with paths
      const context = contextNodes.map(n => ({
        title: n.title,
        id: n.id,
        path: n.absPath || '',
      }));

      ws.send(JSON.stringify({
        type: 'garden',
        conversation: conversation,
        context: context,
      }));
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      const el = document.getElementById('garden-status');

      if (data.type === 'garden_status') {
        if (el) el.textContent = data.message;
      } else if (data.type === 'garden_result') {
        if (el) {
          let text = data.message || 'Done.';
          if (data.edits) {
            text += '\n\n';
            for (const edit of data.edits) {
              const icon = edit.status === 'ok' ? '✓' : edit.status === 'warning' ? '⚠' : '✗';
              text += `${icon} ${edit.dreamnode}: ${edit.reason}\n`;
            }
          }
          el.textContent = text;
        }
        finishGardening();
      }
    };

    ws.onerror = () => {
      const el = document.getElementById('garden-status');
      if (el) el.textContent = 'Garden error — could not connect.';
      finishGardening();
    };

    ws.onclose = () => { gardenWs = null; };

  } catch (e) {
    const el = document.getElementById('garden-status');
    if (el) el.textContent = 'Garden error: ' + e.message;
    finishGardening();
  }
}

function finishGardening() {
  isGardening = false;
  if (gardenWs) { gardenWs.close(); gardenWs = null; }
  updateSendButton();
}

// ============================================================
// 9c. CLAUDE CODE SUB-AGENT (/do command)
// ============================================================

let claudeWs = null;
let isClaudeWorking = false;

function getClaudeWsUrl() {
  const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${wsProtocol}//${window.location.host}/ws/claude`;
}

function startClaudeCode(prompt) {
  if (isClaudeWorking) return;
  isClaudeWorking = true;

  // Show status in chat
  const statusMsg = document.createElement('div');
  statusMsg.className = 'msg assistant';
  statusMsg.id = 'claude-status';
  statusMsg.textContent = 'Spawning Claude Code...';
  messagesEl.appendChild(statusMsg);
  scrollToBottom();

  try {
    const ws = new WebSocket(getClaudeWsUrl());
    claudeWs = ws;

    ws.onopen = () => {
      const context = contextNodes.map(n => ({
        title: n.title,
        id: n.id,
        path: n.absPath || '',
      }));

      ws.send(JSON.stringify({
        type: 'claude_code',
        prompt: prompt,
        context: context,
        conversation: conversation,
      }));
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      const el = document.getElementById('claude-status');

      if (data.type === 'claude_prompt') {
        if (el) {
          const details = document.createElement('details');
          details.style.cssText = 'margin-top:8px;font-size:0.85em;opacity:0.7;';
          const summary = document.createElement('summary');
          summary.textContent = 'Prompt sent to Claude Code';
          summary.style.cursor = 'pointer';
          const pre = document.createElement('pre');
          pre.style.cssText = 'white-space:pre-wrap;margin:6px 0 0;max-height:200px;overflow-y:auto;font-size:0.9em;';
          pre.textContent = data.prompt;
          details.appendChild(summary);
          details.appendChild(pre);
          el.appendChild(details);
          scrollToBottom();
        }
      } else if (data.type === 'claude_status') {
        if (el) {
          // Update just the status text (first text node), keep prompt details intact
          const firstChild = el.firstChild;
          if (firstChild && firstChild.nodeType === Node.TEXT_NODE) {
            firstChild.textContent = data.message;
          } else {
            el.insertBefore(document.createTextNode(data.message), el.firstChild);
          }
        }
      } else if (data.type === 'claude_result') {
        if (el) {
          // Replace status text
          const firstChild = el.firstChild;
          const statusText = data.status === 'error' ? 'Claude Code error.' : 'Claude Code done.';
          if (firstChild && firstChild.nodeType === Node.TEXT_NODE) {
            firstChild.textContent = statusText;
          } else {
            el.insertBefore(document.createTextNode(statusText), el.firstChild);
          }
          // Show result + cost in a details block
          const details = document.createElement('details');
          details.open = true;
          details.style.cssText = 'margin-top:8px;font-size:0.85em;';
          const summary = document.createElement('summary');
          summary.style.cursor = 'pointer';
          let summaryText = data.status === 'error' ? 'Error' : 'Result';
          if (data.cost) summaryText += ` ($${data.cost.toFixed(4)})`;
          summary.textContent = summaryText;
          const pre = document.createElement('pre');
          pre.style.cssText = 'white-space:pre-wrap;margin:6px 0 0;max-height:400px;overflow-y:auto;font-size:0.9em;';
          pre.textContent = data.message || '(no output)';
          details.appendChild(summary);
          details.appendChild(pre);
          if (data.status === 'done') {
            const hint = document.createElement('div');
            hint.style.cssText = 'margin-top:6px;opacity:0.6;font-size:0.85em;';
            hint.textContent = 'Refresh page for UI changes. Use reload button for server changes.';
            details.appendChild(hint);
          }
          el.appendChild(details);
          el.removeAttribute('id');
          scrollToBottom();
        }
        // Add to conversation so AURYN knows what happened
        conversation.push({ role: 'assistant', content: '[Claude Code] ' + (data.message || 'Done.') });
        finishClaudeCode();
      }
    };

    ws.onerror = () => {
      const el = document.getElementById('claude-status');
      if (el) el.textContent = 'Claude Code error — could not connect.';
      finishClaudeCode();
    };

    ws.onclose = () => { claudeWs = null; };

  } catch (e) {
    const el = document.getElementById('claude-status');
    if (el) el.textContent = 'Claude Code error: ' + e.message;
    finishClaudeCode();
  }
}

function finishClaudeCode() {
  isClaudeWorking = false;
  if (claudeWs) { claudeWs.close(); claudeWs = null; }
  updateSendButton();
}

// Server reload
function reloadServer() {
  const protocol = window.location.protocol;
  const host = window.location.host;
  fetch(`${protocol}//${host}/reload`, { method: 'POST' })
    .then(() => {
      const msg = document.createElement('div');
      msg.className = 'msg assistant';
      msg.textContent = 'Server restarting... reconnecting in 5s.';
      messagesEl.appendChild(msg);
      scrollToBottom();
      // Reconnect after restart
      setTimeout(() => { window.location.reload(); }, 5000);
    })
    .catch(e => {
      const msg = document.createElement('div');
      msg.className = 'msg assistant';
      msg.textContent = 'Reload failed: ' + e.message;
      messagesEl.appendChild(msg);
    });
}

// ============================================================
// 10. EVENT HANDLERS
// ============================================================
sendBtn.addEventListener('click', () => {
  const hasText = inputEl.value.trim().length > 0;
  if (hasText) {
    sendMessage();
  } else if (contextNodes.length > 0) {
    startGardening();
  }
});
stopBtn.addEventListener('click', () => { cancelStream(); });

micBtn.addEventListener('click', () => {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
});

// Autocomplete-aware keydown handler
inputEl.addEventListener('keydown', (e) => {
  if (acVisible) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acSelectedIndex = Math.min(acSelectedIndex + 1, acFilteredItems.length - 1);
      renderAutocomplete();
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      acSelectedIndex = Math.max(acSelectedIndex - 1, 0);
      renderAutocomplete();
      return;
    }
    if (e.key === 'Enter' || e.key === 'Tab') {
      e.preventDefault();
      acceptAutocomplete(acSelectedIndex);
      return;
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      hideAutocomplete();
      return;
    }
  }

  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const hasText = inputEl.value.trim().length > 0;
    if (hasText) {
      sendMessage();
    } else if (contextNodes.length > 0) {
      startGardening();
    }
  }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  updateSendButton();

  // Check for @ autocomplete trigger
  const text = inputEl.value;
  const cursor = inputEl.selectionStart;

  // Find the last @ before cursor
  let atPos = -1;
  for (let i = cursor - 1; i >= 0; i--) {
    if (text[i] === '@') {
      atPos = i;
      break;
    }
    // Stop searching if we hit a space before finding @
    if (text[i] === ' ' && i < cursor - 1) break;
    // Also stop at newlines
    if (text[i] === '\n') break;
  }

  if (atPos >= 0 && dreamNodeCatalog.length > 0) {
    const query = text.slice(atPos + 1, cursor);
    acTriggerPos = atPos;
    showAutocomplete(query);
  } else {
    hideAutocomplete();
  }
});

// Close autocomplete when clicking outside
document.addEventListener('click', (e) => {
  if (!inputEl.contains(e.target) && !autocompleteEl.contains(e.target)) {
    hideAutocomplete();
  }
});

// ============================================================
// 11. INIT
// ============================================================
connectTranscriptionWs();
updateSendButton();
