// ============================================================
// 8. TRANSCRIPTION (VOICE)
// ============================================================
function getTranscriptionWsUrl() {
  if (standaloneMode) {
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    return `${wsProtocol}//${window.location.host}${BASE_PATH}/ws/transcribe`;
  }
  return `ws://127.0.0.1:8080/ws/transcribe`;
}

function connectTranscriptionWs() {
  const url = getTranscriptionWsUrl();
  console.log('[AURYN] Connecting transcription WS:', url);

  try {
    transcriptionWs = new WebSocket(url);

    transcriptionWs.onopen = () => {
      console.log('[AURYN] Transcription WS connected');
      micBtn.disabled = false;
      micBtn.title = 'Record voice';
    };

    transcriptionWs.onmessage = (e) => {
      const data = JSON.parse(e.data);

      // Chunk-array model: input field is rebuilt from this array.
      // Corrections update entries in-place, avoiding position drift.
      if (!window._txChunks) window._txChunks = [];
      if (!window._txPrefix) window._txPrefix = ''; // text typed before recording

      if (data.type === 'transcript_chunk') {
        // Append chunk to array
        const entry = { index: data.chunk_index, text: data.text, stage: data.stage || 'whisper' };
        window._txChunks.push(entry);
        // Rebuild input field from chunk array
        inputEl.value = window._txPrefix + window._txChunks.map(c => c.text).join('');
        inputEl.selectionStart = inputEl.selectionEnd = inputEl.value.length;
        inputEl.style.height = 'auto';
        inputEl.style.height = inputEl.scrollHeight + 'px';
        inputEl.focus();
      } else if (data.type === 'dreamnode_detected') {
        // A DreamNode name was recognized in the transcript — add to context petals
        const node = findCatalogNode(data.folder, data.title, data.uuid);
        if (node) {
          if (data.path) node.absPath = data.path;
          addToContext(node);
          console.log('[AURYN] DreamNode detected in voice:', node.title);
        }
      } else if (data.type === 'stream_ended') {
        // Leave text in the input field for editing — don't auto-send
        window._txChunks = [];
        window._txPrefix = '';
        document.getElementById('vocab-debug').classList.remove('active');
        inputEl.focus();
        inputEl.style.height = 'auto';
        inputEl.style.height = inputEl.scrollHeight + 'px';
        // Add any pinned DreamNodes that weren't already in context
        if (data.pinned_dreamnodes && Array.isArray(data.pinned_dreamnodes)) {
          for (const folder of data.pinned_dreamnodes) {
            const node = findCatalogNode(folder);
            if (node) addToContext(node);
          }
        }
        // Resolve stopRecording promise — transcription is complete
        if (stopRecordingResolve) {
          stopRecordingResolve();
          stopRecordingResolve = null;
        }
      } else if (data.type === 'transcript_full') {
        // Async mode: server sends full transcript as single source of truth
        inputEl.value = window._txPrefix + data.text;
        inputEl.selectionStart = inputEl.selectionEnd = inputEl.value.length;
        inputEl.style.height = 'auto';
        inputEl.style.height = inputEl.scrollHeight + 'px';
        inputEl.focus();
      } else if (data.type === 'transcript_correction') {
        console.log('[Gatekeeper] Correction received (not applied to UI):', (data.replace_text || '').substring(0, 80));
      } else if (data.type === 'vocab_update') {
        renderVocabDebug(data);
      } else if (data.type === 'session_started') {
        console.log('[AURYN] Transcription session:', data.session_id);
        // Reset chunk array for new session, preserve any existing text as prefix
        window._txPrefix = inputEl.value;
        window._txChunks = [];
        // Show vocab debug panel during transcription
        document.getElementById('vocab-debug').classList.add('active');
      }
    };

    transcriptionWs.onclose = () => {
      console.log('[AURYN] Transcription WS disconnected');
      micBtn.disabled = true;
      micBtn.title = 'Transcription server unavailable';
      transcriptionWs = null;
      setTimeout(connectTranscriptionWs, 5000);
    };

    transcriptionWs.onerror = () => {
      console.log('[AURYN] Transcription WS error');
    };
  } catch (e) {
    console.log('[AURYN] Cannot connect to transcription server:', e.message);
    micBtn.disabled = true;
    micBtn.title = 'Transcription server unavailable';
  }
}

async function startRecording() {
  if (!transcriptionWs || transcriptionWs.readyState !== WebSocket.OPEN) {
    console.log('[AURYN] No transcription server');
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 }
    });

    transcriptionWs.send(JSON.stringify({ type: 'start_stream', pipeline_mode: pipelineMode }));

    mediaRecorder = new MediaRecorder(stream, {
      mimeType: 'audio/webm;codecs=opus'
    });

    mediaRecorder.ondataavailable = async (e) => {
      if (e.data.size > 0 && transcriptionWs && transcriptionWs.readyState === WebSocket.OPEN) {
        const buffer = await e.data.arrayBuffer();
        transcriptionWs.send(buffer);
      }
    };

    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(track => track.stop());
      if (transcriptionWs && transcriptionWs.readyState === WebSocket.OPEN) {
        transcriptionWs.send(JSON.stringify({ type: 'end_stream' }));
      }
    };

    inputEl.focus();
    mediaRecorder.start(500);
    isRecording = true;
    micBtn.classList.add('recording');
    micBtn.title = 'Stop recording';

    scrollToBottom();
  } catch (err) {
    console.error('[AURYN] Mic error:', err);
  }
}

let stopRecordingResolve = null;

function stopRecording() {
  return new Promise((resolve) => {
    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.title = 'Record voice';
      resolve();
      return;
    }
    // Store resolve — will be called when stream_ended arrives
    stopRecordingResolve = resolve;
    // Safety timeout in case server never responds
    const timeout = setTimeout(() => {
      stopRecordingResolve = null;
      resolve();
    }, 10000);
    // Wrap resolve to also clear timeout
    const origResolve = stopRecordingResolve;
    stopRecordingResolve = () => { clearTimeout(timeout); origResolve(); };

    mediaRecorder.stop();
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.title = 'Record voice';
  });
}

function finishRecording(fullText) {
  // Text is already in the textarea — just focus for editing
  inputEl.focus();
  inputEl.style.height = 'auto';
  inputEl.style.height = inputEl.scrollHeight + 'px';
}

// ============================================================
// 9. DRAG AND DROP FILES (audio → transcribe, others → upload)
// ============================================================
let dragCounter = 0;
const AUDIO_EXTS = /\.(webm|mp3|wav|m4a|ogg|mp4|aac|flac|opus|wma|amr|caf)$/i;

function isAudioFile(file) {
  return file.type.startsWith('audio/') || file.type.startsWith('video/') || AUDIO_EXTS.test(file.name);
}

document.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  dropOverlay.classList.add('active');
});

document.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    dropOverlay.classList.remove('active');
  }
});

document.addEventListener('dragover', (e) => {
  e.preventDefault();
});

document.addEventListener('drop', async (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove('active');

  const files = [...e.dataTransfer.files];
  if (files.length === 0) return;

  for (const file of files) {
    stageFile(file);
  }
});

// ============================================================
// ATTACHMENT STAGING
// ============================================================

function stageFile(file) {
  const id = crypto.randomUUID();
  const entry = {
    id, file, serverPath: '', filename: file.name,
    size: file.size, type: file.type,
    uploading: true, transcribing: false, transcript: '',
  };
  stagedFiles.push(entry);
  renderStaging();

  // Upload immediately
  const formData = new FormData();
  formData.append('file', file);
  fetch(SERVER_BASE + '/upload', { method: 'POST', body: formData })
    .then(r => r.json())
    .then(result => {
      const uploaded = result.files[0];
      entry.serverPath = uploaded.path;
      entry.size = uploaded.size;
      entry.uploading = false;
      renderStaging();

      // For audio files, auto-trigger transcription
      if (isAudioFile(file)) {
        entry.transcribing = true;
        renderStaging();
        transcribeFileStaged(entry);
      }
    })
    .catch(err => {
      entry.uploading = false;
      console.warn('[AURYN] Upload failed:', err);
      renderStaging();
    });
}

async function transcribeFileStaged(entry) {
  const url = getTranscriptionWsUrl();
  try {
    const ws = new WebSocket(url);
    const buffer = await entry.file.arrayBuffer();

    await new Promise((resolve, reject) => {
      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'start_stream', filename: entry.filename, pipeline_mode: pipelineMode }));
        ws.send(buffer);
        ws.send(JSON.stringify({ type: 'end_stream' }));
      };

      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'transcript_chunk') {
          entry.transcript += data.text;
          renderStaging();
        } else if (data.type === 'stream_ended') {
          entry.serverPath = data.file_path || entry.serverPath;
          ws.close();
          resolve();
        }
      };

      ws.onerror = () => reject(new Error('Transcription failed'));
      ws.onclose = () => resolve();
    });

    entry.transcript = entry.transcript.trim();
    entry.transcribing = false;
    renderStaging();
  } catch (err) {
    entry.transcribing = false;
    console.warn('[AURYN] Transcription failed:', err);
    renderStaging();
  }
}

function removeStagedFile(id) {
  stagedFiles = stagedFiles.filter(f => f.id !== id);
  renderStaging();
}

function renderStaging() {
  attachmentStaging.innerHTML = '';
  if (stagedFiles.length === 0) return;

  stagedFiles.forEach(entry => {
    const el = document.createElement('div');
    el.className = 'staged-file';

    if (entry.type && entry.type.startsWith('image/')) {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(entry.file);
      el.appendChild(img);
    } else if (isAudioFile(entry.file)) {
      const icon = document.createElement('div');
      icon.className = 'file-icon audio-icon';
      icon.textContent = '\u266B'; // music note
      el.appendChild(icon);
    } else {
      const icon = document.createElement('div');
      icon.className = 'file-icon';
      icon.textContent = '\u{1F4C4}';
      el.appendChild(icon);
    }

    if (entry.uploading) {
      const ind = document.createElement('div');
      ind.className = 'upload-indicator';
      ind.textContent = '\u21BB'; // uploading
      el.appendChild(ind);
    } else if (entry.transcribing) {
      const ind = document.createElement('div');
      ind.className = 'upload-indicator';
      ind.textContent = '\u2026'; // transcribing...
      el.appendChild(ind);
    }

    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.textContent = '\u00D7';
    removeBtn.addEventListener('click', () => removeStagedFile(entry.id));
    el.appendChild(removeBtn);

    const label = document.createElement('div');
    label.className = 'staged-label';
    label.textContent = entry.filename;
    el.appendChild(label);

    attachmentStaging.appendChild(el);
  });
}

function getStagedContext() {
  // Build context text from staged files for inclusion in the message
  if (stagedFiles.length === 0) return '';
  const parts = [];
  for (const entry of stagedFiles) {
    if (!entry.serverPath) continue; // not yet uploaded
    const sizeFmt = entry.size > 1024*1024
      ? (entry.size / (1024*1024)).toFixed(1) + ' MB'
      : (entry.size / 1024).toFixed(1) + ' KB';

    if (entry.transcript) {
      parts.push(`[Audio: ${entry.serverPath}]\nOriginal: ${entry.filename} (${sizeFmt})\nTranscript:\n${entry.transcript}`);
    } else {
      parts.push(`[File: ${entry.serverPath}]\nOriginal: ${entry.filename} (${sizeFmt})`);
    }
  }
  return parts.join('\n\n');
}

function clearStaging() {
  stagedFiles = [];
  renderStaging();
}

async function uploadFile(file) {
  // Legacy function kept for compatibility — now stages instead
  stageFile(file);
}

async function transcribeFile(file) {
  // Use the exact same /ws/transcribe pipeline as live mic recording.
  // Protocol: start_stream → binary audio data → end_stream → receive transcript_chunk events.

  const label = document.createElement('div');
  label.className = 'transcript-label';
  label.textContent = `${file.name}: connecting...`;
  messagesEl.appendChild(label);
  scrollToBottom();

  const url = getTranscriptionWsUrl();
  let transcript = '';
  let serverPath = '';

  try {
    const ws = new WebSocket(url);
    const buffer = await file.arrayBuffer();

    await new Promise((resolve, reject) => {
      ws.onopen = () => {
        label.textContent = `${file.name}: transcribing...`;
        ws.send(JSON.stringify({ type: 'start_stream', filename: file.name, pipeline_mode: pipelineMode }));
        ws.send(buffer);
        ws.send(JSON.stringify({ type: 'end_stream' }));
      };

      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'transcript_chunk') {
          transcript += data.text;
          label.textContent = `${file.name}: transcribing... (${transcript.trim().length} chars)`;
          scrollToBottom();
        } else if (data.type === 'stream_ended') {
          serverPath = data.file_path || '';
          ws.close();
          resolve();
        }
      };

      ws.onerror = () => reject(new Error('WebSocket connection failed'));
      ws.onclose = () => resolve();
    });

    transcript = transcript.trim();
    if (transcript) {
      label.textContent = `transcribed: ${file.name}`;
      const filePath = serverPath || file.name;
      const contextText = `[Voice memo: ${filePath}]\nOriginal name: ${file.name}\n\n${transcript}`;
      const userMsg = document.createElement('div');
      userMsg.className = 'msg user';
      userMsg.textContent = contextText;
      messagesEl.appendChild(userMsg);
      conversation.push({ role: 'user', content: contextText });
      saveChat();
      scrollToBottom();
    } else {
      label.textContent = `no speech detected: ${file.name}`;
    }
  } catch (err) {
    label.textContent = `error: ${file.name}`;
    const errEl = document.createElement('div');
    errEl.className = 'msg assistant';
    errEl.textContent = err.message;
    messagesEl.appendChild(errEl);
  }
}

  // New chat button
  const newBtn = document.createElement('div');
  newBtn.className = 'chat-history-new';
  newBtn.textContent = '+ New Chat';
  newBtn.addEventListener('click', () => {
    chatHistoryPanel.classList.remove('visible');
    clearChat();
  });
  chatHistoryPanel.appendChild(newBtn);

  if (chats.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:10px;color:#555;font-size:12px;text-align:center';
    empty.textContent = 'No chat history';
    chatHistoryPanel.appendChild(empty);
    return;
  }

  chats.forEach(chat => {
    const item = document.createElement('div');
    item.className = 'chat-history-item';
    if (chat.threadId === chatThreadId) item.classList.add('active');

    const time = document.createElement('div');
    time.className = 'chat-time';
    if (chat.savedAt) {
      const d = new Date(chat.savedAt);
      time.textContent = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    } else {
      time.textContent = chat.filename;
    }
    item.appendChild(time);

    if (chat.preview) {
      const preview = document.createElement('div');
      preview.className = 'chat-preview';
      preview.textContent = chat.preview;
      item.appendChild(preview);
    }

    item.addEventListener('click', () => {
      chatHistoryPanel.classList.remove('visible');
      switchToThread(chat.threadId);
    });

    chatHistoryPanel.appendChild(item);
  });
}

function switchToThread(threadId) {
  // Save current chat first
  saveChat();
  chatThreadId = threadId;
  conversation = [];
  messagesEl.innerHTML = '';
  loadChat();
}

// Close chat history panel when clicking outside
document.addEventListener('click', (e) => {
  if (!chatHistoryPanel.contains(e.target) && e.target.id !== 'history-btn') {
    chatHistoryPanel.classList.remove('visible');
  }
});

// ============================================================
// 9c. KNOWLEDGE GARDENING
// ============================================================

const SEND_ICON = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';
const GARDEN_ICON = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c4.97 0 9-4.03 9-9-4.97 0-9 4.03-9 9zM5.6 10.25c0 1.38 1.12 2.5 2.5 2.5.53 0 1.01-.16 1.42-.44l-.02.19c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5l-.02-.19c.4.28.89.44 1.42.44 1.38 0 2.5-1.12 2.5-2.5 0-1-.59-1.85-1.43-2.25.84-.4 1.43-1.25 1.43-2.25 0-1.38-1.12-2.5-2.5-2.5-.53 0-1.01.16-1.42.44l.02-.19C14.5 2.12 13.38 1 12 1S9.5 2.12 9.5 3.5l.02.19c-.4-.28-.89-.44-1.42-.44-1.38 0-2.5 1.12-2.5 2.5 0 1 .59 1.85 1.43 2.25-.84.4-1.43 1.25-1.43 2.25zM12 5.5c1.38 0 2.5 1.12 2.5 2.5s-1.12 2.5-2.5 2.5S9.5 9.38 9.5 8s1.12-2.5 2.5-2.5zM3 13c0 4.97 4.03 9 9 9-4.97 0-9-4.03-9-9z"/></svg>';

let gardenWs = null;
let isGardening = false;

function updateSendButton() {
  const hasText = inputEl.value.trim().length > 0 || stagedFiles.length > 0;
  const hasContext = contextNodes.length > 0;
  if (!hasText && hasContext && !isStreaming && !isGardening) {
    sendBtn.innerHTML = GARDEN_ICON;
    sendBtn.classList.add('garden-mode');
    sendBtn.title = 'Garden — route insights to DreamNodes';
    sendBtn.disabled = false;
  } else {
    sendBtn.innerHTML = SEND_ICON;
    sendBtn.classList.remove('garden-mode');
    sendBtn.title = 'Send';
    sendBtn.disabled = isStreaming;
  }
}

function getGardenWsUrl() {
  const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${wsProtocol}//${window.location.host}/ws/garden`;
}

function startGardening() {
  if (isGardening || conversation.length === 0) return;
  if (contextNodes.length === 0) return;

  isGardening = true;
  sendBtn.disabled = true;

  // Show gardening status in chat
  const statusMsg = document.createElement('div');
  statusMsg.className = 'msg assistant';
  statusMsg.id = 'garden-status';
  statusMsg.textContent = 'Gardening...';
  messagesEl.appendChild(statusMsg);
  scrollToBottom();

  try {
    const ws = new WebSocket(getGardenWsUrl());
    gardenWs = ws;

    ws.onopen = () => {
      // Send the full conversation + context with paths
      const context = contextNodes.map(n => ({
        title: n.title,
        id: n.id,
        path: n.absPath || '',
      }));

      ws.send(JSON.stringify({
        type: 'garden',
        conversation: conversation,
        context: context,
      }));
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      const el = document.getElementById('garden-status');

      if (data.type === 'garden_status') {
        if (el) el.textContent = data.message;
      } else if (data.type === 'garden_result') {
        if (el) {
          let text = data.message || 'Done.';
          if (data.edits) {
            text += '\n\n';
            for (const edit of data.edits) {
              const icon = edit.status === 'ok' ? '✓' : edit.status === 'warning' ? '⚠' : '✗';
              text += `${icon} ${edit.dreamnode}: ${edit.reason}\n`;
            }
          }
          el.textContent = text;
        }
        finishGardening();
      }
    };

    ws.onerror = () => {
      const el = document.getElementById('garden-status');
      if (el) el.textContent = 'Garden error — could not connect.';
      finishGardening();
    };

    ws.onclose = () => { gardenWs = null; };

  } catch (e) {
    const el = document.getElementById('garden-status');
    if (el) el.textContent = 'Garden error: ' + e.message;
    finishGardening();
  }
}

function finishGardening() {
  isGardening = false;
  if (gardenWs) { gardenWs.close(); gardenWs = null; }
  updateSendButton();
}

// ============================================================
// 9c. CLAUDE CODE SUB-AGENT (/do command)
// ============================================================

let claudeWs = null;
let isClaudeWorking = false;

function getClaudeWsUrl() {
  const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${wsProtocol}//${window.location.host}/ws/claude`;
}

function startClaudeCode(prompt) {
  if (isClaudeWorking) return;
  isClaudeWorking = true;

  // Show status in chat
  const statusMsg = document.createElement('div');
  statusMsg.className = 'msg assistant';
  statusMsg.id = 'claude-status';
  statusMsg.textContent = 'Spawning Claude Code...';
  messagesEl.appendChild(statusMsg);
  scrollToBottom();

  try {
    const ws = new WebSocket(getClaudeWsUrl());
    claudeWs = ws;

    ws.onopen = () => {
      const context = contextNodes.map(n => ({
        title: n.title,
        id: n.id,
        path: n.absPath || '',
      }));

      ws.send(JSON.stringify({
        type: 'claude_code',
        prompt: prompt,
        context: context,
        conversation: conversation,
      }));
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      const el = document.getElementById('claude-status');

      if (data.type === 'claude_prompt') {
        if (el) {
          const details = document.createElement('details');
          details.style.cssText = 'margin-top:8px;font-size:0.85em;opacity:0.7;';
          const summary = document.createElement('summary');
          summary.textContent = 'Prompt sent to Claude Code';
          summary.style.cursor = 'pointer';
          const pre = document.createElement('pre');
          pre.style.cssText = 'white-space:pre-wrap;margin:6px 0 0;max-height:200px;overflow-y:auto;font-size:0.9em;';
          pre.textContent = data.prompt;
          details.appendChild(summary);
          details.appendChild(pre);
          el.appendChild(details);
          scrollToBottom();
        }
      } else if (data.type === 'claude_status') {
        if (el) {
          // Update just the status text (first text node), keep prompt details intact
          const firstChild = el.firstChild;
          if (firstChild && firstChild.nodeType === Node.TEXT_NODE) {
            firstChild.textContent = data.message;
          } else {
            el.insertBefore(document.createTextNode(data.message), el.firstChild);
          }
        }
      } else if (data.type === 'claude_result') {
        if (el) {
          // Replace status text
          const firstChild = el.firstChild;
          const statusText = data.status === 'error' ? 'Claude Code error.' : 'Claude Code done.';
          if (firstChild && firstChild.nodeType === Node.TEXT_NODE) {
            firstChild.textContent = statusText;
          } else {
            el.insertBefore(document.createTextNode(statusText), el.firstChild);
          }
          // Show result + cost in a details block
          const details = document.createElement('details');
          details.open = true;
          details.style.cssText = 'margin-top:8px;font-size:0.85em;';
          const summary = document.createElement('summary');
          summary.style.cursor = 'pointer';
          let summaryText = data.status === 'error' ? 'Error' : 'Result';
          if (data.cost) summaryText += ` ($${data.cost.toFixed(4)})`;
          summary.textContent = summaryText;
          const pre = document.createElement('pre');
          pre.style.cssText = 'white-space:pre-wrap;margin:6px 0 0;max-height:400px;overflow-y:auto;font-size:0.9em;';
          pre.textContent = data.message || '(no output)';
          details.appendChild(summary);
          details.appendChild(pre);
          if (data.status === 'done') {
            const hint = document.createElement('div');
            hint.style.cssText = 'margin-top:6px;opacity:0.6;font-size:0.85em;';
            hint.textContent = 'Refresh page for UI changes. Use reload button for server changes.';
            details.appendChild(hint);
          }
          el.appendChild(details);
          el.removeAttribute('id');
          scrollToBottom();
        }
        // Add to conversation so AURYN knows what happened
        conversation.push({ role: 'assistant', content: '[Claude Code] ' + (data.message || 'Done.') });
        finishClaudeCode();
      }
    };

    ws.onerror = () => {
      const el = document.getElementById('claude-status');
      if (el) el.textContent = 'Claude Code error — could not connect.';
      finishClaudeCode();
    };

    ws.onclose = () => { claudeWs = null; };

  } catch (e) {
    const el = document.getElementById('claude-status');
    if (el) el.textContent = 'Claude Code error: ' + e.message;
    finishClaudeCode();
  }
}

function finishClaudeCode() {
  isClaudeWorking = false;
  if (claudeWs) { claudeWs.close(); claudeWs = null; }
  updateSendButton();
}

// Server reload
// Pipeline mode toggle: "async" (high quality, 30s turbo) vs "sync" (real-time moonshine+whisper+gatekeeper)
let pipelineMode = 'async';
function togglePipeline() {
  pipelineMode = pipelineMode === 'async' ? 'sync' : 'async';
  const btn = document.getElementById('pipeline-toggle');
  btn.textContent = pipelineMode;
  btn.classList.toggle('active', pipelineMode === 'async');
  console.log('[AURYN] Pipeline mode:', pipelineMode);
}

function reloadServer() {
  const protocol = window.location.protocol;
  const host = window.location.host;
  fetch(`${protocol}//${host}/reload`, { method: 'POST' })
    .then(() => {
      const msg = document.createElement('div');
      msg.className = 'msg assistant';
      msg.textContent = 'Server restarting... reconnecting in 5s.';
      messagesEl.appendChild(msg);
      scrollToBottom();
      // Reconnect after restart
      setTimeout(() => { window.location.reload(); }, 5000);
    })
    .catch(e => {
      const msg = document.createElement('div');
      msg.className = 'msg assistant';
      msg.textContent = 'Reload failed: ' + e.message;
      messagesEl.appendChild(msg);
    });
}

// ============================================================
// 10. EVENT HANDLERS
// ============================================================
sendBtn.addEventListener('click', async () => {
  if (isRecording) await stopRecording();
  const hasText = inputEl.value.trim().length > 0 || stagedFiles.length > 0;
  if (hasText) {
    sendMessage();
  } else if (contextNodes.length > 0) {
    startGardening();
  }
});
stopBtn.addEventListener('click', () => { cancelStream(); });

attachBtn.addEventListener('click', () => { attachInput.click(); });
attachInput.addEventListener('change', async () => {
  const files = [...attachInput.files];
  attachInput.value = ''; // reset so same file can be picked again
  for (const file of files) {
    stageFile(file);
  }
});

// Note: no beforeunload handler — Claude Code sessions survive disconnections

micBtn.addEventListener('click', () => {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
});

// Autocomplete-aware keydown handler
inputEl.addEventListener('keydown', (e) => {
  if (acVisible) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acSelectedIndex = Math.min(acSelectedIndex + 1, acFilteredItems.length - 1);
      renderAutocomplete();
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      acSelectedIndex = Math.max(acSelectedIndex - 1, 0);
      renderAutocomplete();
      return;
    }
    if (e.key === 'Enter' || e.key === 'Tab') {
      e.preventDefault();
      acceptAutocomplete(acSelectedIndex);
      return;
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      hideAutocomplete();
      return;
    }
  }

  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    (async () => {
      if (isRecording) await stopRecording();
      const hasText = inputEl.value.trim().length > 0 || stagedFiles.length > 0;
      if (hasText) {
        sendMessage();
      } else if (contextNodes.length > 0) {
        startGardening();
      }
    })();
  }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  updateSendButton();

  // Check for @ autocomplete trigger
  const text = inputEl.value;
  const cursor = inputEl.selectionStart;

  // Find the last @ before cursor
  let atPos = -1;
  for (let i = cursor - 1; i >= 0; i--) {
    if (text[i] === '@') {
      atPos = i;
      break;
    }
    // Stop searching if we hit a space before finding @
    if (text[i] === ' ' && i < cursor - 1) break;
    // Also stop at newlines
    if (text[i] === '\n') break;
  }

  if (atPos >= 0 && dreamNodeCatalog.length > 0) {
    const query = text.slice(atPos + 1, cursor);
    acTriggerPos = atPos;
    showAutocomplete(query);
  } else {
    hideAutocomplete();
  }
});

// Close autocomplete when clicking outside
document.addEventListener('click', (e) => {
  if (!inputEl.contains(e.target) && !autocompleteEl.contains(e.target)) {
    hideAutocomplete();
  }
});

connectTranscriptionWs();
updateSendButton();
