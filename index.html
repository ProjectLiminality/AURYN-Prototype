<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURYN</title>
<style>
  @font-face {
    font-family: 'TeX Gyre Termes';
    src: url('fonts/texgyretermes-regular.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; color: #e0e0e0;
    font-family: 'TeX Gyre Termes', Georgia, serif;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  #messages {
    flex: 1; overflow-y: auto; padding: 24px 16px;
    display: flex; flex-direction: column; gap: 20px;
    scrollbar-width: thin; scrollbar-color: #333 #000;
  }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: #000; }
  #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  .msg { border-radius: 12px; line-height: 1.6; }
  .msg.user {
    align-self: flex-end; max-width: 85%; background: #1a1a1a; color: #ccc;
    border: 1px solid #333; font-size: 16px; padding: 10px 16px;
  }
  .msg.assistant {
    align-self: flex-start; width: 100%; position: relative; padding: 0;
  }
  .msg.transcript {
    align-self: flex-start; width: 100%; position: relative; padding: 0;
  }

  /* The rendered markdown text layer */
  .msg.assistant .text-layer, .msg.transcript .text-layer {
    font-family: 'TeX Gyre Termes', Georgia, serif;
    font-size: 20px; color: #fff; line-height: 1.6;
    word-wrap: break-word;
  }
  .msg.transcript .text-layer { color: #b0b0b0; }
  .msg.assistant .text-layer p { margin-bottom: 0.6em; }
  .msg.assistant .text-layer p:last-child { margin-bottom: 0; }
  .msg.assistant .text-layer strong { font-weight: bold; }
  .msg.assistant .text-layer em { font-style: italic; }
  .msg.assistant .text-layer code {
    background: #1a1a1a; padding: 1px 5px; border-radius: 3px;
    font-family: monospace; font-size: 0.9em;
  }
  .msg.assistant .text-layer .list-block {
    margin: 0.3em 0;
  }
  .msg.assistant .text-layer .list-item {
    padding-left: 0;
  }

  /* SVG animation overlay — positioned over the text layer */
  .msg.assistant .svg-overlay, .msg.transcript .svg-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1;
  }
  .msg.assistant .svg-overlay svg, .msg.transcript .svg-overlay svg {
    width: 100%; height: 100%; display: block;
  }

  .streaming-cursor {
    display: inline-block; width: 2px; height: 1em;
    background: #FFD700; margin-left: 2px;
    animation: blink 0.8s step-end infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Write animation keyframes */
  @keyframes stroke-draw { to { stroke-dashoffset: 0; } }
  @keyframes fill-reveal { to { fill-opacity: 1; } }
  @keyframes stroke-fade { to { stroke-opacity: 0; } }
  @keyframes overlay-fadeout { to { opacity: 0; } }

  .char-path-stroke {
    fill: transparent; stroke: #fff; stroke-width: 1.5;
    fill-opacity: 0; stroke-opacity: 1;
  }
  .char-path-fill {
    fill: #fff; fill-opacity: 0; stroke: none;
  }
  /* Transcript uses muted color */
  .msg.transcript .char-path-stroke { stroke: #b0b0b0; }
  .msg.transcript .char-path-fill { fill: #b0b0b0; }

  #input-area {
    padding: 12px 16px; border-top: 1px solid #1a1a1a;
    display: flex; gap: 10px; align-items: flex-end;
    background: #000;
  }
  #input-area textarea {
    flex: 1; background: #111; border: 1px solid #333;
    border-radius: 8px; color: #e0e0e0; padding: 10px 14px;
    font-family: inherit; font-size: 16px; resize: none;
    outline: none; min-height: 42px; max-height: 120px;
    line-height: 1.4;
  }
  #input-area textarea:focus { border-color: #555; }
  #input-area textarea::placeholder { color: #444; }

  #send-btn, #stop-btn, #mic-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
  }
  #send-btn { background: #FFD700; color: #000; }
  #send-btn:disabled { background: #333; color: #666; cursor: default; }
  #send-btn svg { width: 18px; height: 18px; }
  #stop-btn { background: #8B0000; color: #fff; display: none; }
  #stop-btn svg { width: 16px; height: 16px; }
  #mic-btn { background: #222; color: #888; }
  #mic-btn:disabled { opacity: 0.3; cursor: default; }
  #mic-btn svg { width: 18px; height: 18px; }
  #mic-btn.recording { background: #8B0000; color: #fff; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

  #fallback-msg {
    display: none; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); text-align: center;
    color: #444; font-size: 16px; line-height: 1.6;
  }
  #fallback-msg .accent { color: #FFD700; }

  /* Drag-and-drop overlay */
  #drop-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 100;
    border: 3px dashed #FFD700;
    flex-direction: column; align-items: center; justify-content: center;
    color: #FFD700; font-size: 20px;
  }
  #drop-overlay.active { display: flex; }

  /* Transcript label */
  .transcript-label {
    font-size: 11px; color: #555; margin-bottom: 4px;
    font-family: -apple-system, sans-serif;
  }

  /* Connection status indicator */
  #connection-status {
    display: none; padding: 4px 16px; background: #0a0a0a;
    border-bottom: 1px solid #1a1a1a; font-size: 11px;
    font-family: -apple-system, sans-serif; color: #555;
  }
  #connection-status.connected { color: #4a7a4a; }
  #connection-status.disconnected { color: #7a4a4a; }
</style>
</head>
<body>
<div id="connection-status"></div>
<div id="messages"></div>
<div id="input-area">
  <textarea id="input" rows="1" placeholder="Talk to AURYN..." autofocus></textarea>
  <button id="mic-btn" title="Record voice">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </button>
  <button id="send-btn" title="Send">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
  <button id="stop-btn" title="Stop">
    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
  </button>
</div>
<div id="drop-overlay">Drop audio file to transcribe</div>
<div id="fallback-msg">
  Open in the <span class="accent">InterBrain</span> to chat with AURYN
</div>
<!-- Hidden link so html-loader resolves the font path to an app:// URL -->
<link id="font-resource" href="fonts/texgyretermes-regular.otf" rel="preload" as="font" type="font/otf" crossorigin style="display:none">

<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<script>
// ============================================================
// 1. STATE
// ============================================================
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const stopBtn = document.getElementById('stop-btn');
const micBtn = document.getElementById('mic-btn');
const fallbackEl = document.getElementById('fallback-msg');
const dropOverlay = document.getElementById('drop-overlay');
const connectionStatus = document.getElementById('connection-status');

let conversation = [];
let isStreaming = false;
let currentRequestId = null;
let font = null;
let fontLoaded = false;
let aiBridgeReady = false;
let standaloneMode = false;

// Transcription state
let isRecording = false;
let mediaRecorder = null;
let transcriptionWs = null;
let transcriptMsg = null; // the active transcript message object

const SYSTEM_PROMPT = `You are AURYN, the cultivation layer of DreamOS. Named after the Ouroboros amulet from The Neverending Story — "Do what you will."

You help users tend their knowledge garden: creating DreamNodes, weaving DreamSongs, discovering connections through semantic search, and nurturing visions from seeds to harvest. You speak with warmth and clarity, like a wise gardener who knows the soil intimately.

Keep responses concise and grounded. Use metaphor when it illuminates, not to obscure. Never use emojis. Respond in plain text with minimal markdown — use **bold** sparingly for emphasis, use bullet lists with dashes when listing items. Do not use headers.`;

// ============================================================
// 2. AI BRIDGE
// ============================================================
const instanceId = crypto.randomUUID();

// postMessage handler for iframe AI bridge
window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || !d.type) return;

  if (d.type === 'ai-bridge-ready') {
    if (d.instanceId && d.instanceId !== instanceId) return;
    aiBridgeReady = true;
    console.log('[AURYN] AI bridge ready via iframe (v' + d.version + ')');
    fallbackEl.style.display = 'none';
    messagesEl.style.display = '';
    document.getElementById('input-area').style.display = '';
    return;
  }

  if (d.requestId !== currentRequestId) return;

  if (d.type === 'ai-inference-stream-chunk') {
    appendChunk(d.chunk);
  } else if (d.type === 'ai-inference-stream-done') {
    finishStream();
  } else if (d.type === 'ai-inference-stream-error') {
    finishStream(d.error);
  }
});

// Check if we're inside an iframe (InterBrain) or standalone
const isInIframe = window.parent !== window;

if (isInIframe) {
  fallbackEl.style.display = 'block';
  document.getElementById('input-area').style.display = 'none';
  messagesEl.style.display = 'none';

  window.parent.postMessage({ type: 'ai-bridge-probe', instanceId }, '*');
  setTimeout(() => {
    if (!aiBridgeReady) {
      console.log('[AURYN] No AI bridge — showing fallback');
    }
  }, 500);
} else {
  // Standalone mode — connect to AI bridge WebSocket server
  standaloneMode = true;
  fallbackEl.style.display = 'none';
  messagesEl.style.display = '';
  document.getElementById('input-area').style.display = '';
  connectionStatus.style.display = 'block';
  connectionStatus.textContent = 'Connecting to InterBrain...';
  connectionStatus.className = 'disconnected';
  console.log('[AURYN] Standalone mode — connecting to AI bridge WebSocket');
  connectAIBridgeWs();
}

function sendStreamRequest(messages) {
  if (standaloneMode) {
    sendWsBridgeRequest(messages);
    return;
  }
  currentRequestId = crypto.randomUUID();
  window.parent.postMessage({
    type: 'ai-inference-stream-request',
    requestId: currentRequestId,
    messages,
    complexity: 'standard'
  }, '*');
}

function cancelStream() {
  if (standaloneMode) {
    if (currentRequestId && aiBridgeWs && aiBridgeWs.readyState === WebSocket.OPEN) {
      aiBridgeWs.send(JSON.stringify({
        type: 'ai-inference-stream-cancel',
        requestId: currentRequestId
      }));
    }
    finishStream();
    return;
  }
  if (currentRequestId) {
    window.parent.postMessage({
      type: 'ai-inference-stream-cancel',
      requestId: currentRequestId
    }, '*');
  }
  finishStream();
}

// ============================================================
// 2b. AI BRIDGE WEBSOCKET (standalone mode)
// ============================================================
// Connects to the InterBrain plugin's AI Bridge WebSocket server.
// Same protocol as the iframe postMessage bridge — the plugin
// routes to whatever LLM provider is configured in settings.

const AI_BRIDGE_PORT = 27182;
let aiBridgeWs = null;

function getAIBridgeWsUrl() {
  // When served by server.py, the InterBrain is on the same machine
  // Use the page's hostname (works for both localhost and Tailscale IP)
  const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const host = window.location.hostname || 'localhost';
  return `${wsProtocol}//${host}:${AI_BRIDGE_PORT}`;
}

function connectAIBridgeWs() {
  const url = getAIBridgeWsUrl();
  console.log('[AURYN] Connecting AI bridge WS:', url);

  try {
    aiBridgeWs = new WebSocket(url);

    aiBridgeWs.onopen = () => {
      console.log('[AURYN] AI bridge WS connected');
      connectionStatus.textContent = 'Connected to InterBrain';
      connectionStatus.className = 'connected';
      // Hide after 3s if connected
      setTimeout(() => {
        if (aiBridgeWs && aiBridgeWs.readyState === WebSocket.OPEN) {
          connectionStatus.style.display = 'none';
        }
      }, 3000);
    };

    aiBridgeWs.onmessage = (e) => {
      const data = JSON.parse(e.data);

      if (data.type === 'ai-bridge-ready') {
        console.log('[AURYN] AI bridge ready via WebSocket (v' + data.version + ')');
        return;
      }

      if (data.requestId !== currentRequestId) return;

      if (data.type === 'ai-inference-stream-chunk') {
        appendChunk(data.chunk);
      } else if (data.type === 'ai-inference-stream-done') {
        finishStream();
      } else if (data.type === 'ai-inference-stream-error') {
        finishStream(data.error);
      }
    };

    aiBridgeWs.onclose = () => {
      console.log('[AURYN] AI bridge WS disconnected');
      aiBridgeWs = null;
      connectionStatus.style.display = 'block';
      connectionStatus.textContent = 'Disconnected from InterBrain — reconnecting...';
      connectionStatus.className = 'disconnected';
      setTimeout(connectAIBridgeWs, 3000);
    };

    aiBridgeWs.onerror = () => {
      console.log('[AURYN] AI bridge WS error');
    };
  } catch (e) {
    console.log('[AURYN] Cannot connect to AI bridge:', e.message);
    connectionStatus.style.display = 'block';
    connectionStatus.textContent = 'Cannot reach InterBrain';
    connectionStatus.className = 'disconnected';
    setTimeout(connectAIBridgeWs, 5000);
  }
}

function sendWsBridgeRequest(messages) {
  if (!aiBridgeWs || aiBridgeWs.readyState !== WebSocket.OPEN) {
    finishStream('Not connected to InterBrain. Make sure Obsidian is running.');
    return;
  }

  currentRequestId = crypto.randomUUID();
  aiBridgeWs.send(JSON.stringify({
    type: 'ai-inference-stream-request',
    requestId: currentRequestId,
    messages,
    complexity: 'standard'
  }));
}

// ============================================================
// 3. FONT LOADING
// ============================================================
async function loadFont() {
  try {
    const fontLink = document.getElementById('font-resource');
    const fontUrl = fontLink ? fontLink.href : 'fonts/texgyretermes-regular.otf';
    console.log('[AURYN] Loading font from:', fontUrl);

    try {
      font = await opentype.load(fontUrl);
    } catch (_) {
      const resp = await fetch(fontUrl);
      if (resp.ok) {
        const buf = await resp.arrayBuffer();
        font = opentype.parse(buf);
      }
    }

    if (font) {
      fontLoaded = true;
      console.log('[AURYN] Font loaded:', font.names.fontFamily.en);
    } else {
      console.warn('[AURYN] Font not found, using text fallback');
    }
  } catch (err) {
    console.warn('[AURYN] Font load error:', err.message);
  }
}
loadFont();

// ============================================================
// 4. MARKDOWN RENDERING
// ============================================================
function renderMarkdown(text) {
  // Convert markdown to HTML
  let html = escapeHtml(text);

  // Bold: **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic: *text*
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code: `text`
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Split into paragraphs on double newline
  const blocks = html.split('\n\n');
  const rendered = blocks.map(block => {
    block = block.trim();
    if (!block) return '';

    // Check if block is a list (lines starting with - )
    const lines = block.split('\n');
    const isList = lines.every(l => /^[-]\s/.test(l.trim()) || !l.trim());
    if (isList) {
      // Render as dash-prefixed lines to match SVG animation exactly
      const items = lines
        .filter(l => l.trim())
        .map(l => '<div class="list-item">' + l.trim() + '</div>')
        .join('');
      return '<div class="list-block">' + items + '</div>';
    }

    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('');

  return rendered;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ============================================================
// 5. MARKDOWN STREAM PARSER
// ============================================================
// Parses raw markdown text incrementally into styled tokens.
// Tracks open/close state of ** and * across chunk boundaries.
// Returns an array of {char, bold, italic} for each visible character,
// consuming the delimiter characters silently.

function createMarkdownParser() {
  let buf = '';       // unparsed buffer
  let bold = false;
  let italic = false;
  let emitted = 0;   // how many tokens we've already returned

  return {
    // Feed new raw text, return only the NEW tokens since last call
    feed(chunk) {
      buf += chunk;
      const tokens = [];
      let i = 0;

      while (i < buf.length) {
        // Check for ** (bold toggle) — must check before single *
        if (buf[i] === '*' && buf[i + 1] === '*') {
          // Need at least 2 chars to confirm
          if (i + 1 < buf.length) {
            bold = !bold;
            i += 2;
            continue;
          } else {
            break; // wait for more data
          }
        }
        // Check for * (italic toggle) — but not if next char is also *
        if (buf[i] === '*' && buf[i + 1] !== '*') {
          italic = !italic;
          i += 1;
          continue;
        }
        // Check for single * at end of buffer — ambiguous, wait
        if (buf[i] === '*' && i === buf.length - 1) {
          break;
        }
        // Check for ` (code) — consume delimiters, emit chars as-is
        if (buf[i] === '`') {
          i++;
          while (i < buf.length && buf[i] !== '`') {
            tokens.push({ char: buf[i], bold: false, italic: false, code: true });
            i++;
          }
          if (i < buf.length) i++; // skip closing `
          continue;
        }

        tokens.push({ char: buf[i], bold, italic, code: false });
        i++;
      }

      // Keep unconsumed portion
      buf = buf.slice(i);

      // Return only new tokens
      const newTokens = tokens.slice(0);
      return newTokens;
    },

    // Flush any remaining buffer (end of stream)
    flush() {
      const tokens = [];
      for (const ch of buf) {
        if (ch !== '*' && ch !== '`') {
          tokens.push({ char: ch, bold, italic, code: false });
        }
      }
      buf = '';
      return tokens;
    }
  };
}

// ============================================================
// 6. WRITE ANIMATION ENGINE
// ============================================================
const STROKE_DURATION = 0.5;
const FILL_DELAY = 0.1;
const CASCADE_DELAY = 0.0075;  // very tight cascade = fast wave spread
const ANIM_FONT_SIZE = 20;
const ANIM_LINE_HEIGHT = ANIM_FONT_SIZE * 1.6;
const PARAGRAPH_GAP = ANIM_FONT_SIZE * 0.6;
const BOLD_STROKE_WIDTH = 2.5;
const NORMAL_STROKE_WIDTH = 1.5;
const ITALIC_SKEW = -12; // degrees

let activeMsg = null;

function createAnimatedMessage(cssClass) {
  const div = document.createElement('div');
  div.className = 'msg ' + cssClass;

  const textLayer = document.createElement('div');
  textLayer.className = 'text-layer';
  div.appendChild(textLayer);

  messagesEl.appendChild(div);

  const msg = {
    el: div,
    textLayer: textLayer,
    fullText: '',
    mdParser: createMarkdownParser(),
    svgOverlay: null,
    svgEl: null,
    xOffset: 0,
    lineData: [],
    animatedChars: 0,
    wordBuffer: [],
    pendingNewlines: 0,
    strokeColor: cssClass === 'transcript' ? '#b0b0b0' : '#fff',
    fillColor: cssClass === 'transcript' ? '#b0b0b0' : '#fff',
  };

  if (fontLoaded) {
    textLayer.style.visibility = 'hidden';

    const overlay = document.createElement('div');
    overlay.className = 'svg-overlay';
    const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgEl.style.overflow = 'visible';
    overlay.appendChild(svgEl);
    div.appendChild(overlay);

    msg.svgOverlay = overlay;
    msg.svgEl = svgEl;
    startNewLineFor(msg);
  }

  scrollToBottom();
  return msg;
}

function createAssistantMessage() {
  activeMsg = createAnimatedMessage('assistant');
  return activeMsg.el;
}

function getContainerWidthFor(msg) {
  if (!msg || !msg.el) return 500;
  return msg.el.clientWidth || 500;
}

function getContainerWidth() {
  return getContainerWidthFor(activeMsg);
}

function startNewLineFor(msg, extraGap) {
  if (!msg) return;
  let newY;
  if (msg.lineData.length === 0) {
    newY = ANIM_FONT_SIZE;
  } else {
    const prevY = msg.lineData[msg.lineData.length - 1].y;
    newY = prevY + ANIM_LINE_HEIGHT + (extraGap || 0);
  }
  msg.lineData.push({ y: newY });
  msg.xOffset = 0;
}

function startNewLine(extraGap) {
  startNewLineFor(activeMsg, extraGap);
}

function measureTokens(tokens) {
  if (!font) return tokens.length * ANIM_FONT_SIZE * 0.5;
  const scale = ANIM_FONT_SIZE / font.unitsPerEm;
  let w = 0;
  for (const tok of tokens) {
    const g = font.charToGlyph(tok.char);
    w += (g.advanceWidth ?? ANIM_FONT_SIZE * 0.6) * scale;
  }
  return w;
}

function flushWordFor(msg) {
  if (!msg || msg.wordBuffer.length === 0) return;

  const tokens = msg.wordBuffer;
  const containerWidth = getContainerWidthFor(msg);
  const wordWidth = measureTokens(tokens);

  if (msg.xOffset > 0 && msg.xOffset + wordWidth > containerWidth) {
    startNewLineFor(msg);
  }

  for (const tok of tokens) {
    renderCharToSVGFor(msg, tok.char, msg.animatedChars, tok.bold, tok.italic);
    msg.animatedChars++;
  }

  msg.wordBuffer = [];
}

function flushWord() {
  flushWordFor(activeMsg);
}

function renderCharToSVGFor(msg, char, charIndex, isBold, isItalic) {
  if (!font || !msg || !msg.svgEl) return;

  const svgEl = msg.svgEl;
  const scale = ANIM_FONT_SIZE / font.unitsPerEm;
  const glyph = font.charToGlyph(char);
  const advance = (glyph.advanceWidth ?? ANIM_FONT_SIZE * 0.6) * scale;

  const x = msg.xOffset;
  const y = msg.lineData[msg.lineData.length - 1].y;

  const path = glyph.getPath(x, y, ANIM_FONT_SIZE);
  const pathStr = path.toSVG(2);
  const dMatch = pathStr.match(/d="([^"]+)"/);

  if (dMatch && char !== ' ') {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

    // Apply italic skew transform around character center
    if (isItalic) {
      const skewRad = ITALIC_SKEW * Math.PI / 180;
      const yCenter = y - ANIM_FONT_SIZE * 0.4;
      const xShift = -yCenter * Math.tan(skewRad);
      g.setAttribute('transform', `translate(${xShift}, 0) skewX(${ITALIC_SKEW})`);
    }

    // Measure path length
    const tempPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    tempPath.setAttribute('d', dMatch[1]);
    svgEl.appendChild(tempPath);
    const pathLength = tempPath.getTotalLength() || 100;
    svgEl.removeChild(tempPath);

    const delay = charIndex * CASCADE_DELAY;
    const strokeWidth = isBold ? BOLD_STROKE_WIDTH : NORMAL_STROKE_WIDTH;

    // Stroke layer
    const strokePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    strokePath.setAttribute('d', dMatch[1]);
    strokePath.setAttribute('class', 'char-path-stroke');
    strokePath.style.stroke = msg.strokeColor;
    strokePath.style.strokeWidth = strokeWidth;
    strokePath.style.strokeDasharray = pathLength;
    strokePath.style.strokeDashoffset = pathLength;
    strokePath.style.animation =
      `stroke-draw ${STROKE_DURATION}s ${delay}s ease-in-out forwards, ` +
      `stroke-fade 0.3s ${delay + STROKE_DURATION + FILL_DELAY}s ease-out forwards`;
    g.appendChild(strokePath);

    // Fill layer
    const fillPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    fillPath.setAttribute('d', dMatch[1]);
    fillPath.setAttribute('class', 'char-path-fill');
    fillPath.style.fill = msg.fillColor;
    fillPath.style.animation =
      `fill-reveal 0.3s ${delay + STROKE_DURATION * 0.6}s ease-in forwards`;
    g.appendChild(fillPath);

    svgEl.appendChild(g);
  }

  msg.xOffset += advance;

  // Update SVG viewBox
  const totalHeight = msg.lineData.length * ANIM_LINE_HEIGHT + ANIM_FONT_SIZE * 0.5;
  const containerWidth = getContainerWidthFor(msg);
  svgEl.setAttribute('viewBox', `0 0 ${containerWidth} ${totalHeight}`);
  svgEl.style.height = totalHeight + 'px';
}

function renderCharToSVG(char, charIndex, isBold, isItalic) {
  renderCharToSVGFor(activeMsg, char, charIndex, isBold, isItalic);
}

function processTokensFor(msg, tokens) {
  if (!msg) return;

  for (const tok of tokens) {
    if (tok.char === '\n') {
      flushWordFor(msg);
      msg.pendingNewlines++;
    } else {
      // Resolve pending newlines before visible content
      if (msg.pendingNewlines > 0) {
        if (msg.pendingNewlines >= 2) {
          startNewLineFor(msg, PARAGRAPH_GAP);
        } else {
          startNewLineFor(msg);
        }
        msg.pendingNewlines = 0;
      }

      if (tok.char === ' ') {
        flushWordFor(msg);
        renderCharToSVGFor(msg, ' ', msg.animatedChars, false, false);
        msg.animatedChars++;
      } else {
        msg.wordBuffer.push(tok);
      }
    }
  }
}

function processTokens(tokens) {
  processTokensFor(activeMsg, tokens);
}

function appendChunkTo(msg, chunk) {
  if (!msg) return;
  msg.fullText += chunk;

  // Update hidden text layer
  msg.textLayer.innerHTML = renderMarkdown(msg.fullText);

  if (fontLoaded && msg.svgEl) {
    const tokens = msg.mdParser.feed(chunk);
    processTokensFor(msg, tokens);
  }

  scrollToBottom();
}

function appendChunk(chunk) {
  appendChunkTo(activeMsg, chunk);
}

function finishAnimatedMessage(msg, error) {
  if (!msg) return;

  // Flush remaining
  if (msg.mdParser) {
    const remaining = msg.mdParser.flush();
    processTokensFor(msg, remaining);
  }
  if (msg.wordBuffer && msg.wordBuffer.length > 0) {
    flushWordFor(msg);
  }

  if (error) {
    const errEl = document.createElement('div');
    errEl.style.color = '#8B0000';
    errEl.style.fontSize = '13px';
    errEl.style.marginTop = '8px';
    errEl.textContent = 'Error: ' + error;
    msg.el.appendChild(errEl);
  }

  // Seamless swap: wait for last animation to finish, then fade SVG and reveal text
  if (msg.svgOverlay && msg.svgEl) {
    const lastCharDelay = msg.animatedChars * CASCADE_DELAY;
    const totalAnimTime = (lastCharDelay + STROKE_DURATION + FILL_DELAY + 0.5) * 1000;

    setTimeout(() => {
      if (!msg.el) return;
      msg.svgOverlay.style.transition = 'opacity 0.4s ease-out';
      msg.svgOverlay.style.opacity = '0';
      msg.textLayer.style.visibility = 'visible';
      msg.textLayer.style.opacity = '0';
      msg.textLayer.style.transition = 'opacity 0.4s ease-in';
      msg.textLayer.offsetHeight;
      msg.textLayer.style.opacity = '1';

      setTimeout(() => {
        if (msg.svgOverlay && msg.svgOverlay.parentNode) {
          msg.svgOverlay.remove();
        }
      }, 500);
    }, totalAnimTime);
  } else {
    msg.textLayer.style.visibility = 'visible';
  }
}

function finishStream(error) {
  isStreaming = false;
  currentRequestId = null;
  sendBtn.style.display = '';
  stopBtn.style.display = 'none';
  sendBtn.disabled = false;

  if (activeMsg) {
    finishAnimatedMessage(activeMsg, error);

    // Save to conversation
    if (activeMsg.fullText) {
      conversation.push({ role: 'assistant', content: activeMsg.fullText });
    }

    activeMsg = null;
  }

  inputEl.focus();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

// ============================================================
// 7. CHAT LOGIC
// ============================================================
function sendMessage(text) {
  if (!text) text = inputEl.value.trim();
  if (!text || isStreaming) return;

  const userMsg = document.createElement('div');
  userMsg.className = 'msg user';
  userMsg.textContent = text;
  messagesEl.appendChild(userMsg);

  conversation.push({ role: 'user', content: text });

  inputEl.value = '';
  inputEl.style.height = 'auto';

  const messages = [
    { role: 'system', content: SYSTEM_PROMPT },
    ...conversation
  ];

  isStreaming = true;
  sendBtn.style.display = 'none';
  stopBtn.style.display = 'flex';

  createAssistantMessage();
  sendStreamRequest(messages);
  scrollToBottom();
}

// ============================================================
// 8. TRANSCRIPTION (VOICE)
// ============================================================
function getTranscriptionWsUrl() {
  // When standalone, connect to the same host serving this page
  if (standaloneMode) {
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    return `${wsProtocol}//${window.location.host}/ws/transcribe`;
  }
  // Inside InterBrain iframe (Obsidian Electron): server.py runs on same machine
  // Use plain ws: to localhost:3002 — avoids self-signed cert issues in Electron
  return `ws://localhost:3002/ws/transcribe`;
}

function connectTranscriptionWs() {
  const url = getTranscriptionWsUrl();
  console.log('[AURYN] Connecting transcription WS:', url);

  try {
    transcriptionWs = new WebSocket(url);

    transcriptionWs.onopen = () => {
      console.log('[AURYN] Transcription WS connected');
      micBtn.disabled = false;
      micBtn.title = 'Record voice';
    };

    transcriptionWs.onmessage = (e) => {
      const data = JSON.parse(e.data);

      if (data.type === 'transcript_chunk' && transcriptMsg) {
        // Append a space before the chunk if we already have text
        const prefix = transcriptMsg.fullText ? ' ' : '';
        appendChunkTo(transcriptMsg, prefix + data.text);
      } else if (data.type === 'stream_ended') {
        finishRecording(data.full_text);
      } else if (data.type === 'session_started') {
        console.log('[AURYN] Transcription session:', data.session_id);
      }
    };

    transcriptionWs.onclose = () => {
      console.log('[AURYN] Transcription WS disconnected');
      micBtn.disabled = true;
      micBtn.title = 'Transcription server unavailable';
      transcriptionWs = null;
      // Reconnect after delay
      setTimeout(connectTranscriptionWs, 5000);
    };

    transcriptionWs.onerror = () => {
      console.log('[AURYN] Transcription WS error');
    };
  } catch (e) {
    console.log('[AURYN] Cannot connect to transcription server:', e.message);
    micBtn.disabled = true;
    micBtn.title = 'Transcription server unavailable';
  }
}

async function startRecording() {
  if (!transcriptionWs || transcriptionWs.readyState !== WebSocket.OPEN) {
    console.log('[AURYN] No transcription server');
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 }
    });

    // Signal start
    transcriptionWs.send(JSON.stringify({ type: 'start_stream' }));

    mediaRecorder = new MediaRecorder(stream, {
      mimeType: 'audio/webm;codecs=opus'
    });

    mediaRecorder.ondataavailable = async (e) => {
      if (e.data.size > 0 && transcriptionWs && transcriptionWs.readyState === WebSocket.OPEN) {
        const buffer = await e.data.arrayBuffer();
        transcriptionWs.send(buffer);
      }
    };

    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(track => track.stop());
      if (transcriptionWs && transcriptionWs.readyState === WebSocket.OPEN) {
        transcriptionWs.send(JSON.stringify({ type: 'end_stream' }));
      }
    };

    // Create transcript message with label
    const label = document.createElement('div');
    label.className = 'transcript-label';
    label.textContent = 'transcribing...';
    messagesEl.appendChild(label);

    transcriptMsg = createAnimatedMessage('transcript');

    // Start recording with 500ms chunks
    mediaRecorder.start(500);
    isRecording = true;
    micBtn.classList.add('recording');
    micBtn.title = 'Stop recording';

    scrollToBottom();
  } catch (err) {
    console.error('[AURYN] Mic error:', err);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording = false;
  micBtn.classList.remove('recording');
  micBtn.title = 'Record voice';
}

function finishRecording(fullText) {
  if (transcriptMsg) {
    // Update label
    const label = transcriptMsg.el.previousElementSibling;
    if (label && label.classList.contains('transcript-label')) {
      label.textContent = 'transcribed';
    }

    finishAnimatedMessage(transcriptMsg);

    // Auto-send as user message if we have text
    const text = fullText || transcriptMsg.fullText;
    transcriptMsg = null;

    if (text && text.trim()) {
      // Brief delay so user sees the transcription before it sends
      setTimeout(() => {
        sendMessage(text.trim());
      }, 800);
    }
  }
}

// ============================================================
// 9. DRAG AND DROP AUDIO
// ============================================================
let dragCounter = 0;

document.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  if (hasAudioFile(e)) {
    dropOverlay.classList.add('active');
  }
});

document.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    dropOverlay.classList.remove('active');
  }
});

document.addEventListener('dragover', (e) => {
  e.preventDefault();
});

document.addEventListener('drop', async (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove('active');

  const files = [...e.dataTransfer.files].filter(f =>
    f.type.startsWith('audio/') ||
    /\.(webm|mp3|wav|m4a|ogg|mp4|aac|flac)$/i.test(f.name)
  );

  if (files.length === 0) return;

  for (const file of files) {
    await transcribeFile(file);
  }
});

function hasAudioFile(e) {
  if (e.dataTransfer.items) {
    for (const item of e.dataTransfer.items) {
      if (item.kind === 'file' && (item.type.startsWith('audio/') || item.type.startsWith('video/'))) {
        return true;
      }
    }
  }
  return true; // Permissive — show overlay, filter on drop
}

async function transcribeFile(file) {
  // Show label
  const label = document.createElement('div');
  label.className = 'transcript-label';
  label.textContent = `transcribing ${file.name}...`;
  messagesEl.appendChild(label);

  const msg = createAnimatedMessage('transcript');
  appendChunkTo(msg, 'Processing audio...');
  scrollToBottom();

  // Upload to server
  const uploadUrl = standaloneMode
    ? '/upload/audio'
    : 'http://localhost:3002/upload/audio';

  try {
    const form = new FormData();
    form.append('file', file, file.name);

    const resp = await fetch(uploadUrl, { method: 'POST', body: form });
    const data = await resp.json();

    // Clear the processing text and show real transcription
    msg.fullText = '';
    msg.textLayer.innerHTML = '';
    if (msg.svgEl) {
      while (msg.svgEl.firstChild) msg.svgEl.removeChild(msg.svgEl.firstChild);
      msg.animatedChars = 0;
      msg.lineData = [];
      msg.xOffset = 0;
      msg.mdParser = createMarkdownParser();
      startNewLineFor(msg);
    }

    if (data.text) {
      appendChunkTo(msg, data.text);
      label.textContent = `transcribed: ${file.name}`;
      finishAnimatedMessage(msg);

      // Auto-send as user message
      setTimeout(() => { sendMessage(data.text.trim()); }, 800);
    } else if (data.error) {
      label.textContent = `failed: ${file.name}`;
      appendChunkTo(msg, data.error);
      finishAnimatedMessage(msg, data.error);
    }
  } catch (err) {
    label.textContent = `error: ${file.name}`;
    finishAnimatedMessage(msg, err.message);
  }
}

// ============================================================
// 10. EVENT HANDLERS
// ============================================================
sendBtn.addEventListener('click', () => sendMessage());
stopBtn.addEventListener('click', () => { cancelStream(); });

micBtn.addEventListener('click', () => {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// ============================================================
// 11. INIT
// ============================================================
// Connect to transcription server
connectTranscriptionWs();
</script>
