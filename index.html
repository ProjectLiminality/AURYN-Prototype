<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURYN</title>
<style>
  @font-face {
    font-family: 'TeX Gyre Termes';
    src: url('fonts/texgyretermes-regular.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent; color: #e0e0e0;
    font-family: 'TeX Gyre Termes', Georgia, serif;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ===== CONTEXT ZONE (upper half) ===== */
  #context-zone {
    height: 40vh; min-height: 160px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    flex-shrink: 0;
    background: rgba(0, 0, 0, 0.35);
  }

  #auryn-symbol {
    width: 120px; height: 120px;
    border-radius: 50%; overflow: hidden;
    cursor: pointer; position: relative;
    z-index: 2; flex-shrink: 0;
    border: 2px solid rgba(255, 215, 0, 0.3);
    transition: border-color 0.3s, transform 0.2s;
  }
  #auryn-symbol:hover {
    border-color: rgba(255, 215, 0, 0.7);
    transform: scale(1.05);
  }
  #auryn-symbol img {
    width: 100%; height: 100%; object-fit: cover;
  }

  /* Petals container — positioned around the AURYN symbol */
  #petals-ring {
    position: absolute; top: 50%; left: 50%;
    width: 0; height: 0;
    z-index: 1;
  }

  .petal {
    position: absolute;
    width: 52px; height: 52px;
    border-radius: 50%; overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s ease, opacity 0.3s ease;
    border: 2px solid rgba(100, 149, 237, 0.6);
  }
  .petal.dreamer { border-color: rgba(205, 92, 92, 0.6); }
  @media (hover: hover) {
    .petal:hover { transform: var(--petal-pos) scale(1.15) !important; }
  }
  .petal:active { opacity: 0.7; }
  .petal img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .petal .petal-remove {
    position: absolute; top: -4px; right: -4px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #333; color: #aaa; border: none;
    font-size: 10px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    line-height: 1;
  }
  .petal:hover .petal-remove { display: flex; }
  .petal .petal-label {
    position: absolute; bottom: -18px; left: 50%;
    transform: translateX(-50%);
    font-size: 9px; color: #555;
    white-space: nowrap; max-width: 80px;
    overflow: hidden; text-overflow: ellipsis;
    font-family: -apple-system, sans-serif;
    pointer-events: none; opacity: 0;
    transition: opacity 0.2s;
  }
  .petal:hover .petal-label { opacity: 1; }

  /* No-image petal fallback */
  .petal .petal-initials {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #1a1a1a; color: #888;
    font-size: 14px; font-weight: bold;
    font-family: -apple-system, sans-serif;
  }

  /* ===== CHAT ZONE (lower half) ===== */
  #chat-zone {
    flex: 1; display: flex; flex-direction: column;
    min-height: 0; /* allow flex shrink */
    border-top: 1px solid rgba(255,255,255,0.08);
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  #messages {
    flex: 1; overflow-y: auto; padding: 16px 16px;
    display: flex; flex-direction: column; gap: 16px;
    scrollbar-width: thin; scrollbar-color: #333 #000;
  }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: #000; }
  #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  .msg { border-radius: 12px; line-height: 1.6; }
  .msg.user {
    align-self: flex-end; max-width: 85%; background: #1a1a1a; color: #ccc;
    border: 1px solid #333; font-size: 16px; padding: 10px 16px;
  }
  .msg.assistant {
    align-self: flex-start; width: 100%; position: relative; padding: 0;
  }
  .msg.transcript {
    align-self: flex-start; width: 100%; position: relative; padding: 0;
  }
  .tool-call-block {
    width: 100%;
    background: #0d1117; border-left: 3px solid #334;
    border-radius: 6px; padding: 8px 12px; font-size: 0.85em;
    color: #aaa; font-family: monospace;
    margin: 8px 0;
  }
  .tool-call-block .tool-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  }
  .tool-call-block .tool-name {
    color: #7aadff; font-weight: bold;
  }
  .tool-call-block .tool-stop-btn {
    width: 20px; height: 20px; border-radius: 50%;
    background: #333; border: 1px solid #555; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0; color: #c44; font-size: 10px; line-height: 1;
    transition: background 0.2s;
  }
  .tool-call-block .tool-stop-btn:hover { background: #500; border-color: #c44; }
  .tool-call-block .tool-stop-btn.hidden { display: none; }
  .tool-call-block .cc-activity {
    margin-top: 6px; padding: 4px 8px;
    background: #0a0e14; border-radius: 4px;
    font-size: 0.85em; color: #8b949e;
    max-height: 200px; overflow-y: auto;
  }
  .tool-call-block .cc-activity .cc-event {
    padding: 2px 0; border-bottom: 1px solid #1a1f2b;
    white-space: pre-wrap; word-break: break-all;
  }
  .tool-call-block .cc-activity .cc-event:last-child { border-bottom: none; }
  .tool-call-block .cc-activity .cc-event-tool { color: #d2a8ff; }
  .tool-call-block .cc-activity .cc-event-text { color: #7ee787; }
  .tool-call-block .cc-activity .cc-event-result { color: #58a6ff; }
  @keyframes cc-pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  .tool-call-block .cc-spinner {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: #7aadff;
    animation: cc-pulse 1.2s ease-in-out infinite;
    margin-right: 6px;
  }
  .tool-call-block details { margin-top: 4px; }
  .tool-call-block summary { cursor: pointer; opacity: 0.7; }
  .tool-call-block summary:hover { opacity: 1; }
  .tool-call-block pre {
    white-space: pre-wrap; margin: 6px 0 0;
    max-height: 300px; overflow-y: auto;
    font-size: 0.9em; color: #ccc;
    background: #0a0a0a; padding: 6px; border-radius: 4px;
  }

  /* The rendered markdown text layer */
  .msg.assistant .text-layer, .msg.transcript .text-layer {
    font-family: 'TeX Gyre Termes', Georgia, serif;
    font-size: 20px; color: #fff; line-height: 1.6;
    word-wrap: break-word;
  }
  .msg.transcript .text-layer { color: #b0b0b0; }
  .msg.assistant .text-layer p { margin-bottom: 0.6em; }
  .msg.assistant .text-layer p:last-child { margin-bottom: 0; }
  .msg.assistant .text-layer strong { font-weight: bold; }
  .msg.assistant .text-layer em { font-style: italic; }
  .msg.assistant .text-layer code {
    background: #1a1a1a; padding: 1px 5px; border-radius: 3px;
    font-family: monospace; font-size: 0.9em;
  }
  .msg.assistant .text-layer .list-block {
    margin: 0.3em 0;
  }
  .msg.assistant .text-layer .list-item {
    padding-left: 0;
  }

  /* SVG animation overlay — positioned over the text layer */
  .msg.assistant .svg-overlay, .msg.transcript .svg-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1;
  }
  .msg.assistant .svg-overlay svg, .msg.transcript .svg-overlay svg {
    width: 100%; height: 100%; display: block;
  }

  .streaming-cursor {
    display: inline-block; width: 2px; height: 1em;
    background: #FFD700; margin-left: 2px;
    animation: blink 0.8s step-end infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Write animation keyframes */
  @keyframes stroke-draw { to { stroke-dashoffset: 0; } }
  @keyframes fill-reveal { to { fill-opacity: 1; } }
  @keyframes stroke-fade { to { stroke-opacity: 0; } }
  @keyframes overlay-fadeout { to { opacity: 0; } }

  .char-path-stroke {
    fill: transparent; stroke: #fff; stroke-width: 1.5;
    fill-opacity: 0; stroke-opacity: 1;
  }
  .char-path-fill {
    fill: #fff; fill-opacity: 0; stroke: none;
  }
  /* Transcript uses muted color */
  .msg.transcript .char-path-stroke { stroke: #b0b0b0; }
  .msg.transcript .char-path-fill { fill: #b0b0b0; }

  /* ===== INPUT AREA ===== */
  #input-area {
    padding: 12px 16px; border-top: 1px solid #1a1a1a;
    display: flex; gap: 10px; align-items: flex-end;
    background: #000; position: relative;
  }
  #input-area textarea {
    flex: 1; background: #111; border: 1px solid #333;
    border-radius: 8px; color: #e0e0e0; padding: 10px 14px;
    font-family: inherit; font-size: 16px; resize: none;
    outline: none; min-height: 42px; max-height: 40vh;
    line-height: 1.4;
  }
  #input-area textarea:focus { border-color: #555; }
  #input-area textarea::placeholder { color: #444; }

  #send-btn, #stop-btn, #mic-btn, #attach-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
  }
  #send-btn { background: #FFD700; color: #000; }
  #send-btn.garden-mode { background: #2d5a27; color: #7fff7f; }
  #send-btn:disabled { background: #333; color: #666; cursor: default; }
  #send-btn svg { width: 18px; height: 18px; }
  #stop-btn { background: #8B0000; color: #fff; display: none; }
  #stop-btn svg { width: 16px; height: 16px; }
  #mic-btn { background: #222; color: #888; }
  #mic-btn:disabled { opacity: 0.3; cursor: default; }
  #mic-btn svg { width: 18px; height: 18px; }
  #mic-btn.recording { background: #8B0000; color: #fff; animation: pulse 1.5s infinite; }
  #attach-btn { background: #222; color: #888; }
  #attach-btn:hover { color: #aaa; }
  #attach-btn svg { width: 18px; height: 18px; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

  /* ===== AUTOCOMPLETE DROPDOWN ===== */
  #autocomplete {
    display: none; position: absolute;
    bottom: 100%; left: 16px; right: 68px;
    max-height: 240px; overflow-y: auto;
    background: #111; border: 1px solid #333;
    border-radius: 8px 8px 0 0;
    z-index: 50;
    scrollbar-width: thin; scrollbar-color: #333 #111;
  }
  #autocomplete::-webkit-scrollbar { width: 4px; }
  #autocomplete::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .ac-item {
    padding: 8px 12px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid #1a1a1a;
    transition: background 0.1s;
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.selected { background: #1a1a1a; }
  .ac-item .ac-thumb {
    width: 28px; height: 28px; border-radius: 50%;
    overflow: hidden; flex-shrink: 0;
    border: 1.5px solid rgba(100, 149, 237, 0.5);
  }
  .ac-item .ac-thumb.dreamer { border-color: rgba(205, 92, 92, 0.5); }
  .ac-item .ac-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .ac-item .ac-thumb .ac-initials {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #1a1a1a; color: #555; font-size: 10px;
    font-family: -apple-system, sans-serif;
  }
  .ac-item .ac-title {
    color: #ccc; font-size: 14px;
    font-family: -apple-system, sans-serif;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .ac-item .ac-type {
    margin-left: auto; font-size: 10px; color: #444;
    font-family: -apple-system, sans-serif;
    flex-shrink: 0;
  }

  #fallback-msg {
    display: none; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); text-align: center;
    color: #444; font-size: 16px; line-height: 1.6;
  }
  #fallback-msg .accent { color: #FFD700; }

  /* Drag-and-drop overlay */
  #drop-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 100;
    border: 3px dashed #FFD700;
    flex-direction: column; align-items: center; justify-content: center;
    color: #FFD700; font-size: 20px;
  }
  #drop-overlay.active { display: flex; }

  /* Transcript label */
  .transcript-label {
    font-size: 11px; color: #555; margin-bottom: 4px;
    font-family: -apple-system, sans-serif;
  }

  /* Connection status indicator */
  #connection-status {
    display: none; padding: 4px 16px; background: #0a0a0a;
    border-bottom: 1px solid #1a1a1a; font-size: 11px;
    font-family: -apple-system, sans-serif; color: #555;
  }
  #connection-status.connected { color: #4a7a4a; }
  #connection-status.disconnected { color: #7a4a4a; }
  #top-toolbar {
    position: fixed; top: 8px; right: 8px; z-index: 9999;
    display: flex; align-items: center; gap: 6px;
  }
  #reload-btn, #clear-chat-btn, #pipeline-toggle, #history-btn {
    background: none; border: 1px solid #333; border-radius: 4px;
    color: #555; font-size: 12px; padding: 4px 10px; cursor: pointer;
    font-family: -apple-system, sans-serif; white-space: nowrap;
    min-height: 30px;
  }
  #reload-btn:hover, #clear-chat-btn:hover, #pipeline-toggle:hover, #history-btn:hover { color: #aaa; border-color: #555; }
  #pipeline-toggle.active { color: #4a9a7a; border-color: #4a9a7a; }

  /* Vocab debug panel */
  #vocab-debug {
    display: none; padding: 6px 16px; background: #0a0a0a;
    border-top: 1px solid #1a1a1a; font-size: 10px; line-height: 1.5;
    font-family: -apple-system, sans-serif; color: #555;
    max-height: 80px; overflow-y: auto;
  }
  #vocab-debug.active { display: block; }
  #vocab-debug .vocab-label { color: #666; margin-right: 4px; }
  #vocab-debug .vocab-core { color: #555; }
  #vocab-debug .vocab-pinned { color: #FFD700; }
  #vocab-debug .vocab-ephemeral { color: #4a7a9a; }

  /* ===== AURYN COMMAND CARDS ===== */
  .auryn-card {
    width: 100%;
    background: #0d1117; border-left: 3px solid #334;
    border-radius: 6px; padding: 8px 12px; font-size: 0.85em;
    color: #aaa; font-family: monospace;
    margin: 4px 0;
  }
  .auryn-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .auryn-op-name { font-weight: bold; color: #d2a8ff; text-transform: uppercase; font-size: 0.8em; }
  .auryn-thumbnails { display: flex; align-items: center; gap: 4px; }
  .auryn-thumb { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
  .auryn-thumb-fallback {
    width: 32px; height: 32px; border-radius: 50%; background: #1a1f2b;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: #888;
  }
  .auryn-arrow { color: #555; font-size: 14px; }
  .auryn-connector { text-align: center; color: #555; padding: 2px 0; font-family: monospace; font-size: 11px; }
  .auryn-compound { border: 1px solid #222; border-radius: 6px; padding: 6px; margin: 8px 0; }
  .auryn-card details { margin-top: 4px; }
  .auryn-card summary { cursor: pointer; opacity: 0.7; font-size: 11px; }
  .auryn-card summary:hover { opacity: 1; }
  .auryn-card pre {
    white-space: pre-wrap; margin: 6px 0 0;
    max-height: 300px; overflow-y: auto;
    font-size: 0.9em; color: #ccc;
    background: #0a0a0a; padding: 6px; border-radius: 4px;
  }
  .auryn-card .tool-output { color: #8b949e; }

  /* ===== ATTACHMENT STAGING ===== */
  #attachment-staging {
    display: flex; gap: 8px; padding: 6px 8px; flex-wrap: wrap;
    border-top: 1px solid #1a1a1a; background: #0a0a0a;
  }
  #attachment-staging:empty { display: none; }
  .staged-file {
    position: relative; width: 48px; height: 48px;
    border-radius: 6px; overflow: hidden;
    border: 1px solid #333; background: #111;
    display: flex; align-items: center; justify-content: center;
  }
  .staged-file img { width: 100%; height: 100%; object-fit: cover; }
  .staged-file .remove-btn {
    position: absolute; top: -4px; right: -4px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #c44; color: white; font-size: 10px;
    cursor: pointer; border: none;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
  }
  .staged-file .upload-indicator {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: #aaa;
  }
  .staged-file .file-icon {
    font-size: 18px; color: #666;
  }
  .staged-file .audio-icon { color: #7ee787; }
  .staged-file .staged-label {
    position: absolute; bottom: -14px; left: 50%;
    transform: translateX(-50%);
    font-size: 8px; color: #555; white-space: nowrap;
    max-width: 60px; overflow: hidden; text-overflow: ellipsis;
    font-family: -apple-system, sans-serif;
  }

  /* ===== CHAT HISTORY PANEL ===== */
  #chat-history-panel {
    display: none; position: fixed;
    top: 44px; right: 8px;
    width: 280px; max-height: 400px;
    background: #0d1117; border: 1px solid #333;
    border-radius: 8px; z-index: 9998;
    overflow-y: auto; padding: 4px;
    font-family: -apple-system, sans-serif;
    scrollbar-width: thin; scrollbar-color: #333 #0d1117;
  }
  #chat-history-panel.visible { display: block; }
  #chat-history-panel::-webkit-scrollbar { width: 4px; }
  #chat-history-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .chat-history-item {
    padding: 8px 10px; border-radius: 6px;
    cursor: pointer; margin: 2px 0;
    font-size: 12px; color: #888;
    transition: background 0.15s;
  }
  .chat-history-item:hover { background: #1a1f2b; color: #ccc; }
  .chat-history-item.active { background: #1a2233; color: #7aadff; }
  .chat-history-item .chat-time { color: #555; font-size: 10px; }
  .chat-history-item .chat-preview {
    color: #666; font-size: 11px; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .chat-history-new {
    padding: 8px 10px; border-radius: 6px;
    cursor: pointer; margin: 2px 0;
    font-size: 12px; color: #7ee787;
    text-align: center; border: 1px dashed #334;
    transition: background 0.15s;
  }
  .chat-history-new:hover { background: #1a2b1a; }
</style>
</head>
<body>
<div id="connection-status"></div>
<div id="top-toolbar">
<button id="pipeline-toggle" class="active" onclick="togglePipeline()" title="Toggle transcription mode: async (high quality, 30s chunks) vs sync (real-time, lower quality)">async</button>
<button id="history-btn" onclick="toggleChatHistory()" title="Chat history">history</button>
<button id="clear-chat-btn" onclick="clearChat()" title="Clear chat (archives current thread)">clear</button>
<button id="reload-btn" onclick="reloadServer()" title="Restart AURYN server">reload</button>
</div>
<div id="chat-history-panel"></div>

<!-- CONTEXT ZONE: AURYN symbol + context petals -->
<div id="context-zone">
  <div id="petals-ring"></div>
  <div id="auryn-symbol" title="Select AURYN in dreamspace">
    <img src="AURYN.jpg" alt="AURYN">
  </div>
</div>

<!-- CHAT ZONE: messages + input -->
<div id="chat-zone">
  <div id="messages"></div>
  <div id="attachment-staging"></div>
  <div id="input-area">
    <div id="autocomplete"></div>
    <input type="file" id="attach-input" accept="image/*,audio/*,video/*,.pdf,.txt,.md,.json,.csv" style="display:none">
    <button id="attach-btn" title="Attach file">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
    </button>
    <textarea id="input" rows="1" placeholder="Talk to AURYN... (@ to reference DreamNodes)" autofocus></textarea>
    <button id="mic-btn" title="Record voice">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
    <button id="stop-btn" title="Stop">

<script>
// ============================================================
// 1. STATE
// ============================================================
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const stopBtn = document.getElementById('stop-btn');
const micBtn = document.getElementById('mic-btn');
const attachBtn = document.getElementById('attach-btn');
const attachInput = document.getElementById('attach-input');
const fallbackEl = document.getElementById('fallback-msg');
const dropOverlay = document.getElementById('drop-overlay');
const connectionStatus = document.getElementById('connection-status');
const attachmentStaging = document.getElementById('attachment-staging');
const chatHistoryPanel = document.getElementById('chat-history-panel');

// Attachment staging state
let stagedFiles = []; // array of { id, file, serverPath, filename, size, type, uploading, transcribing, transcript }
const autocompleteEl = document.getElementById('autocomplete');
const petalsRing = document.getElementById('petals-ring');
const aurynSymbol = document.getElementById('auryn-symbol');

let conversation = [];
let isStreaming = false;
let chatThreadId = 'current';
let currentRequestId = null;
let font = null;
let fontLoaded = false;
let aiBridgeReady = false;
let standaloneMode = false;
const BASE_PATH = ''; // Patched by server when served under a prefix (e.g. '/AURYN')
// When inside InterBrain iframe, HTTP calls go to the local server on port 8080
const SERVER_BASE = 'http://127.0.0.1:8080';

// ============================================================
// SERVER LIFECYCLE — auto-start/stop via InterBrain CLI bridge
// ============================================================
let _serverStarted = false;

function _cliExec(cmd) {
  return new Promise((resolve) => {
    const id = crypto.randomUUID();
    const handler = (e) => {
      if (e.data?.type === 'cli-result' && e.data?.id === id) {
        window.removeEventListener('message', handler);
        resolve({ out: e.data.out || '', err: e.data.err || '', code: e.data.code ?? 0 });
      }
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: 'cli-exec', id, cmd }, '*');
    // Timeout after 15s
    setTimeout(() => { window.removeEventListener('message', handler); resolve({ out: '', err: 'timeout', code: -1 }); }, 15000);
  });
}

async function startAurynServer() {
  if (_serverStarted) return;
  _serverStarted = true;
  connectionStatus.style.display = 'block';
  connectionStatus.textContent = 'Starting AURYN server...';
  connectionStatus.className = 'disconnected';

  // First: probe the CLI bridge to confirm it's available
  const probe = await _cliExec('echo "cli-bridge-ok" && which uv && uv --version');
  console.log('[AURYN] CLI bridge probe out:', probe.out);
  console.log('[AURYN] CLI bridge probe err:', probe.err);
  console.log('[AURYN] CLI bridge probe code:', probe.code);

  if (probe.err === 'timeout' || !probe.out.includes('cli-bridge-ok')) {
    console.error('[AURYN] CLI bridge not available — cannot auto-start server');
    connectionStatus.textContent = 'CLI bridge unavailable. Run: uv run auryn.py serve --port 8080 --no-ssl';
    return;
  }

  // uv lives in ~/.local/bin on this system; inject known locations into PATH
  const UV_PATH = '/Users/davidrug/.local/bin/uv';
  // Kill anything on port 8080 (covers any prior auryn.py process regardless of how it was started)
  const startCmd = `lsof -ti :8080 | xargs kill -9 2>/dev/null; sleep 0.5; ${UV_PATH} run auryn.py serve --port 8080 --host 127.0.0.1 --no-ssl > /tmp/auryn-server.log 2>&1 &`;
  console.log('[AURYN] Starting server:', startCmd);
  const result = await _cliExec(startCmd);
  console.log('[AURYN] Server start out:', result.out);
  console.log('[AURYN] Server start err:', result.err);
  console.log('[AURYN] Server start code:', result.code);

  // Poll for server readiness (first run builds index — can take 10-15s)
  connectionStatus.textContent = 'Waiting for server...';
  // Poll up to 5 minutes — first run downloads Python + ML dependencies (~200MB)
  let attempts = 0;
  const MAX_ATTEMPTS = 300; // 300 × 1s = 5 min
  const pollServer = () => {
    // Show live download progress from log file every 5s
    if (attempts % 5 === 0) {
      _cliExec('tail -3 /tmp/auryn-server.log 2>/dev/null').then(r => {
        if (r.out.trim()) {
          const lastLine = r.out.trim().split('\n').pop();
          connectionStatus.textContent = `Installing... ${lastLine.slice(0, 60)}`;
        }
      });
    }
    fetch(SERVER_BASE + '/catalog')
      .then(r => r.json())
      .then(data => {
        console.log('[AURYN] Server ready, catalog:', data.length, 'nodes');
        requestDreamNodeCatalog();
        loadChat();
        connectAIBridgeWs();
      })
      .catch(() => {
        attempts++;
        if (attempts < MAX_ATTEMPTS) {
          setTimeout(pollServer, 1000);
        } else {
          connectionStatus.textContent = 'Server failed to start after 5min. Check /tmp/auryn-server.log';
          console.error('[AURYN] Server did not start. Log:', '/tmp/auryn-server.log');
        }
      });
  };
  setTimeout(pollServer, 2000);
}

window.addEventListener('beforeunload', () => {
  _cliExec('pkill -f "auryn.py serve" 2>/dev/null');
});

// Fix AURYN symbol src so it resolves correctly in both standalone and iframe (reverse proxy) contexts
document.querySelector('#auryn-symbol img').src = SERVER_BASE + '/AURYN.jpg';

// Transcription state
let isRecording = false;
let mediaRecorder = null;
let transcriptionWs = null;
let transcriptMsg = null; // the active transcript message object

// Context state — DreamNodes loaded into context
let contextNodes = []; // array of { id, title, type, dreamTalkUrl, repoPath, absPath }

// Autocomplete state
let acVisible = false;
let acSelectedIndex = 0;
let acFilteredItems = [];
let acTriggerPos = -1; // cursor position where @ was typed

// DreamNode catalog — populated from InterBrain or dummy data
let dreamNodeCatalog = [];

const SYSTEM_PROMPT = `You are AURYN, the cultivation layer of DreamOS. Named after the Ouroboros amulet from The Neverending Story — "Do what you will."

You help users tend their knowledge garden: creating DreamNodes, weaving DreamSongs, discovering connections through semantic search, and nurturing visions from seeds to harvest. You speak with warmth and clarity, like a wise gardener who knows the soil intimately.

**File context system**: Users can drag and drop files into the chat. Audio files are transcribed and added as context. All other files (images, PDFs, documents) are uploaded and persisted in ~/.auryn/context/ with their server path included in the message. Files persist for 7 days, then auto-clean.

When a file is added to context, you know its exact server path. You can:
- Reference the file content in your responses
- Use auryn cc to delegate file management tasks, or auryn write to route content into a DreamNode README
- Treat it as ephemeral context if it's just informational

The user doesn't need to decide upfront whether a file is temporary or permanent. Everything lands in context first. You intelligently determine if a file should be routed to a DreamNode based on the conversation.

Keep responses concise and grounded. Use metaphor when it illuminates, not to obscure. Never use emojis. Respond in plain text with minimal markdown — use **bold** sparingly for emphasis, use bullet lists with dashes when listing items. Do not use headers.`;

// ============================================================
// 1a. CHAT PERSISTENCE
// ============================================================
function saveChat() {
  if (conversation.length === 0) return;
  fetch(SERVER_BASE + '/chat/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ threadId: chatThreadId, messages: conversation }),
  }).catch(err => console.warn('[AURYN] Chat save failed:', err));
}

function loadChat() {
  return fetch(`${SERVER_BASE}/chat/load?threadId=${chatThreadId}`)
    .then(r => r.json())
    .then(data => {
      if (data.messages && data.messages.length > 0) {
        conversation = data.messages;
        renderChatHistory(data.messages);
      }
    })
    .catch(err => console.warn('[AURYN] Chat load failed:', err));
}

function clearChat() {
  fetch(SERVER_BASE + '/chat/clear', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ threadId: chatThreadId }),
  }).then(() => {
    conversation = [];
    messagesEl.innerHTML = '';
  }).catch(err => console.warn('[AURYN] Chat clear failed:', err));
}

function renderChatHistory(messages) {
  messagesEl.innerHTML = '';
  for (const m of messages) {
    const el = document.createElement('div');
    el.className = m.role === 'user' ? 'msg user' : 'msg assistant';
    if (m.role === 'assistant') {
      // Render markdown-ish content (bold, lists) as HTML
      el.innerHTML = formatAssistantText(m.content);
    } else {
      el.textContent = m.content;
    }
    messagesEl.appendChild(el);
  }
  scrollToBottom();
}

function formatAssistantText(text) {
  // Minimal markdown: **bold**, bullet lists, code blocks
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
  // Convert lines starting with - to list items
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  return html;
}

// ============================================================
// 1b. DREAMNODE CATALOG
// ============================================================
// Fetch real catalog from auryn.py /catalog endpoint (scans vault .udd files).
// Falls back to InterBrain postMessage when in iframe.

function requestDreamNodeCatalog() {
  if (isInIframe) {
    window.parent.postMessage({ type: 'dreamnode-catalog-request' }, '*');
  }
  // Fetch real catalog from server
  fetch(SERVER_BASE + '/catalog')
    .then(r => r.json())
    .then(data => {
      if (data.nodes && data.nodes.length > 0) {
        setDreamNodeCatalog(data.nodes);
      }
    })
    .catch(err => console.warn('[AURYN] Catalog fetch failed:', err));
}

function setDreamNodeCatalog(nodes) {
  dreamNodeCatalog = nodes;
  console.log('[AURYN] DreamNode catalog loaded:', nodes.length, 'nodes');
}

function findCatalogNode(folder, title, uuid) {
  // Match by UUID first, then folder/repoPath, then title
  if (uuid) {
    const byUuid = dreamNodeCatalog.find(n => n.id === uuid);
    if (byUuid) return byUuid;
  }
  if (folder) {
    const byFolder = dreamNodeCatalog.find(n =>
      n.repoPath === folder || n.repoPath === folder.replace(/ /g, '')
    );
    if (byFolder) return byFolder;
  }
  if (title) {
    const byTitle = dreamNodeCatalog.find(n =>
      n.title.toLowerCase() === title.toLowerCase()
    );
    if (byTitle) return byTitle;
  }
  // If not in catalog, create a temporary entry so the petal still shows
  if (folder || title) {
    return {
      id: uuid || `detected-${(folder || title).toLowerCase().replace(/\s+/g, '-')}`,
      title: title || folder,
      type: 'dream',
      repoPath: folder || '',
      dreamTalkUrl: ''
    };
  }
  return null;
}

// ============================================================
// 1c. CONTEXT MANAGEMENT (petals)
// ============================================================
function addToContext(node) {
  if (contextNodes.find(n => n.id === node.id)) return; // already in context
  contextNodes.push(node);
  renderPetals();
  updateSendButton();
}

function removeFromContext(nodeId) {
  contextNodes = contextNodes.filter(n => n.id !== nodeId);
  renderPetals();
  updateSendButton();
}

function renderPetals() {
  petalsRing.innerHTML = '';
  const count = contextNodes.length;
  if (count === 0) return;

  const radius = 82; // distance from center

  contextNodes.forEach((node, i) => {
    const angle = (i / count) * Math.PI * 2 - Math.PI / 2; // start from top
    const x = Math.cos(angle) * radius - 26; // 26 = half petal width
    const y = Math.sin(angle) * radius - 26;

    const petal = document.createElement('div');
    petal.className = 'petal' + (node.type === 'dreamer' ? ' dreamer' : '');
    const posTransform = `translate(${x}px, ${y}px)`;
    petal.style.setProperty('--petal-pos', posTransform);
    petal.style.transform = posTransform;
    petal.title = node.title;

    // Try DreamTalk API first, then dreamTalkUrl, then initials fallback
    const img = document.createElement('img');
    const apiUrl = BASE_PATH + '/api/dreamtalk/' + encodeURIComponent(node.id || '');
    img.src = node.dreamTalkUrl || apiUrl;
    img.alt = node.title;
    img.onerror = () => {
      // If dreamTalkUrl was tried, try API; if API was tried, show initials
      if (img.src !== apiUrl && node.dreamTalkUrl) {
        img.src = apiUrl;
      } else {
        img.remove();
        const initials = document.createElement('div');
        initials.className = 'petal-initials';
        initials.textContent = node.title.slice(0, 2).toUpperCase();
        petal.insertBefore(initials, petal.firstChild);
      }
    };
    petal.appendChild(img);

    // Label
    const label = document.createElement('div');
    label.className = 'petal-label';
    label.textContent = node.title;
    petal.appendChild(label);

    // Remove button
    const removeBtn = document.createElement('button');
    removeBtn.className = 'petal-remove';
    removeBtn.textContent = '\u00d7';
    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      removeFromContext(node.id);
    });
    petal.appendChild(removeBtn);

    // Click to select in dreamspace
    petal.addEventListener('click', () => selectInDreamspace(node.id));

    petalsRing.appendChild(petal);
  });
}

function selectInDreamspace(nodeId) {
  // Always try postMessage if in any iframe (even proxy mode)
  if (window.parent !== window) {
    window.parent.postMessage({
      type: 'select-dreamnode',
      nodeId: nodeId,
      minimizeAuryn: true
    }, '*');
  } else if (aiBridgeWs && aiBridgeWs.readyState === WebSocket.OPEN) {
    aiBridgeWs.send(JSON.stringify({ type: 'select-dreamnode', nodeId }));
  }
  console.log('[AURYN] Select in dreamspace:', nodeId);
}

// AURYN symbol click — select AURYN DreamNode in DreamSpace (UUID loaded from catalog)
aurynSymbol.addEventListener('click', () => {
  // Find AURYN in the catalog by folder name
  const aurynNode = dreamNodeCatalog.find(n =>
    n.folder === 'AURYN' || n.title === 'AURYN'
  );
  if (aurynNode) selectInDreamspace(aurynNode.id);
});

// ============================================================
// 1d. AUTOCOMPLETE
// ============================================================
function showAutocomplete(query) {
  const q = query.toLowerCase();
  acFilteredItems = dreamNodeCatalog.filter(n =>
    n.title.toLowerCase().includes(q)
  ).slice(0, 12);

  if (acFilteredItems.length === 0) {
    hideAutocomplete();
    return;
  }

  acSelectedIndex = 0;
  acVisible = true;
  renderAutocomplete();
  autocompleteEl.style.display = 'block';
}

function hideAutocomplete() {
  acVisible = false;
  acTriggerPos = -1;
  autocompleteEl.style.display = 'none';
  autocompleteEl.innerHTML = '';
}

function renderAutocomplete() {
  autocompleteEl.innerHTML = '';
  acFilteredItems.forEach((node, i) => {
    const item = document.createElement('div');
    item.className = 'ac-item' + (i === acSelectedIndex ? ' selected' : '');

    // Thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'ac-thumb' + (node.type === 'dreamer' ? ' dreamer' : '');
    if (node.dreamTalkUrl) {
      const img = document.createElement('img');
      img.src = node.dreamTalkUrl;
      img.onerror = () => {
        img.remove();
        const init = document.createElement('div');
        init.className = 'ac-initials';
        init.textContent = node.title.slice(0, 2).toUpperCase();
        thumb.appendChild(init);
      };
      thumb.appendChild(img);
    } else {
      const init = document.createElement('div');
      init.className = 'ac-initials';
      init.textContent = node.title.slice(0, 2).toUpperCase();
      thumb.appendChild(init);
    }
    item.appendChild(thumb);

    // Title
    const title = document.createElement('div');
    title.className = 'ac-title';
    title.textContent = node.title;
    item.appendChild(title);

    // Type badge
    const type = document.createElement('div');
    type.className = 'ac-type';
    type.textContent = node.type === 'dreamer' ? 'person' : 'idea';
    item.appendChild(type);

    item.addEventListener('click', () => acceptAutocomplete(i));
    item.addEventListener('mouseenter', () => {
      acSelectedIndex = i;
      renderAutocomplete();
    });

    autocompleteEl.appendChild(item);
  });

  // Scroll selected into view
  const selectedEl = autocompleteEl.querySelector('.ac-item.selected');
  if (selectedEl) selectedEl.scrollIntoView({ block: 'nearest' });
}

function acceptAutocomplete(index) {
  const node = acFilteredItems[index];
  if (!node) return;

  // Replace @query with the title
  const text = inputEl.value;
  const before = text.slice(0, acTriggerPos);
  const after = text.slice(inputEl.selectionStart);
  inputEl.value = before + node.title + ' ' + after;
  inputEl.selectionStart = inputEl.selectionEnd = before.length + node.title.length + 1;

  // Add to context
  addToContext(node);

  hideAutocomplete();
  inputEl.focus();
}

// ============================================================
// 2. AI BRIDGE
// ============================================================
const instanceId = crypto.randomUUID();

// postMessage handler for iframe AI bridge
window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || !d.type) return;

  if (d.type === 'ai-bridge-ready') {
    if (d.instanceId && d.instanceId !== instanceId) return;
    aiBridgeReady = true;
    console.log('[AURYN] AI bridge ready via iframe (v' + d.version + ')');
    fallbackEl.style.display = 'none';
    document.getElementById('chat-zone').style.display = '';
    document.getElementById('context-zone').style.display = '';
    // Request catalog once bridge is ready
    requestDreamNodeCatalog();
    loadChat();
    return;
  }

  // DreamNode catalog response from InterBrain
  if (d.type === 'dreamnode-catalog-response') {
    setDreamNodeCatalog(d.catalog || []);
    return;
  }

  // DreamSpace UI context updates (selected node, navigation)
  if (d.type === 'dreamspace-context') {
    window._dreamspaceContext = d;
    console.log('[AURYN] DreamSpace context:', d.selectedNode?.name || 'none');
    return;
  }

  // Handle petal-add events (from auryn read)
  if (d.type === 'petal-add') {
    const node = d.node;
    const catalogNode = findCatalogNode(null, node.title, node.id);
    if (catalogNode) {
      addToContext(catalogNode);
    } else {
      addToContext({
        id: node.id,
        title: node.title,
        type: node.type || 'dream',
        repoPath: node.path || '',
        dreamTalkUrl: ''
      });
    }
    return;
  }

  if (d.requestId !== currentRequestId) return;

  if (d.type === 'ai-inference-stream-chunk') {
    appendChunk(d.chunk);
  } else if (d.type === 'tool-call-start') {
    handleToolCallStart(d.tool_name, d.tool_input, d.cwd, d.auryn_meta, d.silent);
  } else if (d.type === 'tool-call-result') {
    handleToolCallResult(d.tool_name, d.result);
  } else if (d.type === 'cc-activity') {
    handleCCActivity(d.event);
  } else if (d.type === 'ai-inference-stream-done') {
    finishStream();
  } else if (d.type === 'ai-inference-stream-error') {
    finishStream(d.error);
  }
});

// Check if we're inside an iframe (InterBrain desktop) or standalone
// When served via reverse proxy (BASE_PATH set), always treat as standalone
// even if inside an iframe (e.g. InterBrain Mobile overlay)
const isInIframe = window.parent !== window && !BASE_PATH;

if (isInIframe) {
  // Inside InterBrain — start the local server via CLI bridge, then connect via WS
  standaloneMode = true;
  fallbackEl.style.display = 'none';
  document.getElementById('chat-zone').style.display = '';
  document.getElementById('context-zone').style.display = '';
  startAurynServer();
} else {
  // Opened directly in browser — show instructions
  standaloneMode = false;
  fallbackEl.style.display = 'block';
  fallbackEl.innerHTML = 'Open in the <span class="accent">InterBrain</span> to use AURYN';
  document.getElementById('chat-zone').style.display = 'none';
  document.getElementById('context-zone').style.display = 'none';
}

function sendStreamRequest(messages) {
  if (standaloneMode) {
    sendWsBridgeRequest(messages);
    return;
  }
  currentRequestId = crypto.randomUUID();
  window.parent.postMessage({
    type: 'ai-inference-stream-request',
    requestId: currentRequestId,
    messages,
    complexity: 'standard'
  }, '*');
}

function cancelStream() {
  if (standaloneMode) {
    if (currentRequestId && aiBridgeWs && aiBridgeWs.readyState === WebSocket.OPEN) {
      aiBridgeWs.send(JSON.stringify({
        type: 'ai-inference-stream-cancel',
        requestId: currentRequestId
      }));
    }
    finishStream();
    return;
  }
  if (currentRequestId) {
    window.parent.postMessage({
      type: 'ai-inference-stream-cancel',
      requestId: currentRequestId
    }, '*');
  }
  finishStream();
}

// ============================================================
// 2b. AI BRIDGE WEBSOCKET (standalone mode)
// ============================================================
// Connects to the InterBrain plugin's AI Bridge WebSocket server.
// Same protocol as the iframe postMessage bridge — the plugin
// routes to whatever LLM provider is configured in settings.

const AI_BRIDGE_PORT = 27182;
let aiBridgeWs = null;

function getAIBridgeWsUrl() {
  // Always connect to our own local server (started via CLI bridge or run manually)
  return 'ws://127.0.0.1:8080/ws';
}

function connectAIBridgeWs() {
  const url = getAIBridgeWsUrl();
  console.log('[AURYN] Connecting AI bridge WS:', url);

  try {
    aiBridgeWs = new WebSocket(url);

    aiBridgeWs.onopen = () => {
      console.log('[AURYN] AI bridge WS connected');
      connectionStatus.textContent = 'Connected to AURYN';
      connectionStatus.className = 'connected';
      // Hide after 3s if connected
      setTimeout(() => {
        if (aiBridgeWs && aiBridgeWs.readyState === WebSocket.OPEN) {
          connectionStatus.style.display = 'none';
        }
      }, 3000);
    };

    aiBridgeWs.onmessage = (e) => {
      const data = JSON.parse(e.data);

      if (data.type === 'ai-bridge-ready') {
        console.log('[AURYN] AI bridge ready via WebSocket (v' + data.version + ')');
        return;
      }

      // Handle petal-add events (from auryn read)
      if (data.type === 'petal-add') {
        const node = data.node;
        const catalogNode = findCatalogNode(null, node.title, node.id);
        if (catalogNode) {
          addToContext(catalogNode);
        } else {
          addToContext({
            id: node.id,
            title: node.title,
            type: node.type || 'dream',
            repoPath: node.path || '',
            dreamTalkUrl: ''
          });
        }
        return;
      }

      if (data.requestId !== currentRequestId) return;

      if (data.type === 'ai-inference-stream-chunk') {
        appendChunk(data.chunk);
      } else if (data.type === 'tool-call-start') {
        handleToolCallStart(data.tool_name, data.tool_input, data.cwd, data.auryn_meta, data.silent);
      } else if (data.type === 'tool-call-result') {
        handleToolCallResult(data.tool_name, data.result);
      } else if (data.type === 'cc-activity') {
        handleCCActivity(data.event);
      } else if (data.type === 'ai-inference-stream-done') {
        finishStream();
      } else if (data.type === 'ai-inference-stream-error') {
        finishStream(data.error);
      }
    };

    aiBridgeWs.onclose = () => {
      console.log('[AURYN] AI bridge WS disconnected');
      aiBridgeWs = null;
      connectionStatus.style.display = 'block';
      connectionStatus.textContent = 'Disconnected — reconnecting...';
      connectionStatus.className = 'disconnected';
      setTimeout(connectAIBridgeWs, 3000);
    };

    aiBridgeWs.onerror = () => {
      console.log('[AURYN] AI bridge WS error');
    };
  } catch (e) {
    console.log('[AURYN] Cannot connect to AI bridge:', e.message);
    connectionStatus.style.display = 'block';
    connectionStatus.textContent = 'Cannot reach InterBrain';
    connectionStatus.className = 'disconnected';
    setTimeout(connectAIBridgeWs, 5000);
  }
}

function sendWsBridgeRequest(messages) {
  if (!aiBridgeWs || aiBridgeWs.readyState !== WebSocket.OPEN) {
    finishStream('Not connected to AURYN server.');
    return;
  }

  currentRequestId = crypto.randomUUID();
  aiBridgeWs.send(JSON.stringify({
    type: 'ai-inference-stream-request',
    requestId: currentRequestId,
    messages,
    complexity: 'standard'
  }));
}

async function loadFont() {
  try {
    const fontLink = document.getElementById('font-resource');
    const fontUrl = fontLink ? fontLink.href : 'fonts/texgyretermes-regular.otf';
    console.log('[AURYN] Loading font from:', fontUrl);

    try {
      font = await opentype.load(fontUrl);
    } catch (_) {
      const resp = await fetch(fontUrl);
      if (resp.ok) {
        const buf = await resp.arrayBuffer();
        font = opentype.parse(buf);
      }
    }

    if (font) {
      fontLoaded = true;
      console.log('[AURYN] Font loaded:', font.names.fontFamily.en);
    } else {
      console.warn('[AURYN] Font not found, using text fallback');
    }
  } catch (err) {
    console.warn('[AURYN] Font load error:', err.message);
  }
}

// ============================================================
// 4. MARKDOWN RENDERING
// ============================================================
function renderMarkdown(text) {
  // Convert markdown to HTML
  let html = escapeHtml(text);

  // Bold: **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic: *text*
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code: `text`
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Split into paragraphs on double newline
  const blocks = html.split('\n\n');
  const rendered = blocks.map(block => {
    block = block.trim();
    if (!block) return '';

    // Check if block is a list (lines starting with - )
    const lines = block.split('\n');
    const isList = lines.every(l => /^[-]\s/.test(l.trim()) || !l.trim());
    if (isList) {
      // Render as dash-prefixed lines to match SVG animation exactly
      const items = lines
        .filter(l => l.trim())
        .map(l => '<div class="list-item">' + l.trim() + '</div>')
        .join('');
      return '<div class="list-block">' + items + '</div>';
    }

    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('');

  return rendered;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ============================================================
// 5. MARKDOWN STREAM PARSER
// ============================================================
function createMarkdownParser() {
  let buf = '';
  let bold = false;
  let italic = false;
  let emitted = 0;

  return {
    feed(chunk) {
      buf += chunk;
      const tokens = [];
      let i = 0;

      while (i < buf.length) {
        if (buf[i] === '*' && buf[i + 1] === '*') {
          if (i + 1 < buf.length) {
            bold = !bold;
            i += 2;
            continue;
          } else {
            break;
          }
        }
        if (buf[i] === '*' && buf[i + 1] !== '*') {
          italic = !italic;
          i += 1;
          continue;
        }
        if (buf[i] === '*' && i === buf.length - 1) {
          break;
        }
        if (buf[i] === '`') {
          i++;
          while (i < buf.length && buf[i] !== '`') {
            tokens.push({ char: buf[i], bold: false, italic: false, code: true });
            i++;
          }
          if (i < buf.length) i++;
          continue;
        }

        tokens.push({ char: buf[i], bold, italic, code: false });
        i++;
      }

      buf = buf.slice(i);
      const newTokens = tokens.slice(0);
      return newTokens;
    },

    flush() {
      const tokens = [];
      for (const ch of buf) {
        if (ch !== '*' && ch !== '`') {
          tokens.push({ char: ch, bold, italic, code: false });
        }
      }
      buf = '';
      return tokens;
    }
  };
}

// ============================================================
// 6. WRITE ANIMATION ENGINE
// ============================================================
// Set to true to re-enable the 3B1B character-by-character SVG animation.
// When false, text streams directly into the text layer with no animation.
const WRITE_ANIMATION_ENABLED = false;

const STROKE_DURATION = 0.5;
const FILL_DELAY = 0.1;
const CASCADE_DELAY = 0.0075;
const ANIM_FONT_SIZE = 20;
const ANIM_LINE_HEIGHT = ANIM_FONT_SIZE * 1.6;
const PARAGRAPH_GAP = ANIM_FONT_SIZE * 0.6;
const BOLD_STROKE_WIDTH = 2.5;
const NORMAL_STROKE_WIDTH = 1.5;
const ITALIC_SKEW = -12;

let activeMsg = null;

function createAnimatedMessage(cssClass) {
  const div = document.createElement('div');
  div.className = 'msg ' + cssClass;

  const textLayer = document.createElement('div');
  textLayer.className = 'text-layer';
  div.appendChild(textLayer);

  messagesEl.appendChild(div);

  const msg = {
    el: div,
    textLayer: textLayer,
    fullText: '',
    accumulatedContent: [],  // [{type:'text',text:...}, {type:'tool',name:...,input:...,output:...}]
    mdParser: createMarkdownParser(),
    svgOverlay: null,
    svgEl: null,
    xOffset: 0,
    lineData: [],
    animatedChars: 0,
    wordBuffer: [],
    pendingNewlines: 0,
    strokeColor: cssClass === 'transcript' ? '#b0b0b0' : '#fff',
    fillColor: cssClass === 'transcript' ? '#b0b0b0' : '#fff',
  };

  if (WRITE_ANIMATION_ENABLED && fontLoaded) {
    textLayer.style.visibility = 'hidden';

    const overlay = document.createElement('div');
    overlay.className = 'svg-overlay';
    const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgEl.style.overflow = 'visible';
    overlay.appendChild(svgEl);
    div.appendChild(overlay);

    msg.svgOverlay = overlay;
    msg.svgEl = svgEl;
    startNewLineFor(msg);
  }

  scrollToBottom();
  return msg;
}

function createAssistantMessage() {
  activeMsg = createAnimatedMessage('assistant');
  return activeMsg.el;
}

function getContainerWidthFor(msg) {
  if (!msg || !msg.el) return 500;
  return msg.el.clientWidth || 500;
}

function getContainerWidth() {
  return getContainerWidthFor(activeMsg);
}

function startNewLineFor(msg, extraGap) {
  if (!msg) return;
  let newY;
  if (msg.lineData.length === 0) {
    newY = ANIM_FONT_SIZE;
  } else {
    const prevY = msg.lineData[msg.lineData.length - 1].y;
    newY = prevY + ANIM_LINE_HEIGHT + (extraGap || 0);
  }
  msg.lineData.push({ y: newY });
  msg.xOffset = 0;
}

function startNewLine(extraGap) {
  startNewLineFor(activeMsg, extraGap);
}

function measureTokens(tokens) {
  if (!font) return tokens.length * ANIM_FONT_SIZE * 0.5;
  const scale = ANIM_FONT_SIZE / font.unitsPerEm;
  let w = 0;
  for (const tok of tokens) {
    const g = font.charToGlyph(tok.char);
    w += (g.advanceWidth ?? ANIM_FONT_SIZE * 0.6) * scale;
  }
  return w;
}

function flushWordFor(msg) {
  if (!msg || msg.wordBuffer.length === 0) return;

  const tokens = msg.wordBuffer;
  const containerWidth = getContainerWidthFor(msg);
  const wordWidth = measureTokens(tokens);

  if (msg.xOffset > 0 && msg.xOffset + wordWidth > containerWidth) {
    startNewLineFor(msg);
  }

  for (const tok of tokens) {
    renderCharToSVGFor(msg, tok.char, msg.animatedChars, tok.bold, tok.italic);
    msg.animatedChars++;
  }

  msg.wordBuffer = [];
}

function flushWord() {
  flushWordFor(activeMsg);
}

function renderCharToSVGFor(msg, char, charIndex, isBold, isItalic) {
  if (!font || !msg || !msg.svgEl) return;

  const svgEl = msg.svgEl;
  const scale = ANIM_FONT_SIZE / font.unitsPerEm;
  const glyph = font.charToGlyph(char);
  const advance = (glyph.advanceWidth ?? ANIM_FONT_SIZE * 0.6) * scale;

  const x = msg.xOffset;
  const y = msg.lineData[msg.lineData.length - 1].y;

  const path = glyph.getPath(x, y, ANIM_FONT_SIZE);
  const pathStr = path.toSVG(2);
  const dMatch = pathStr.match(/d="([^"]+)"/);

  if (dMatch && char !== ' ') {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

    if (isItalic) {
      const skewRad = ITALIC_SKEW * Math.PI / 180;
      const yCenter = y - ANIM_FONT_SIZE * 0.4;
      const xShift = -yCenter * Math.tan(skewRad);
      g.setAttribute('transform', `translate(${xShift}, 0) skewX(${ITALIC_SKEW})`);
    }

    const tempPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    tempPath.setAttribute('d', dMatch[1]);
    svgEl.appendChild(tempPath);
    const pathLength = tempPath.getTotalLength() || 100;
    svgEl.removeChild(tempPath);

    const delay = charIndex * CASCADE_DELAY;
    const strokeWidth = isBold ? BOLD_STROKE_WIDTH : NORMAL_STROKE_WIDTH;

    const strokePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    strokePath.setAttribute('d', dMatch[1]);
    strokePath.setAttribute('class', 'char-path-stroke');
    strokePath.style.stroke = msg.strokeColor;
    strokePath.style.strokeWidth = strokeWidth;
    strokePath.style.strokeDasharray = pathLength;
    strokePath.style.strokeDashoffset = pathLength;
    strokePath.style.animation =
      `stroke-draw ${STROKE_DURATION}s ${delay}s ease-in-out forwards, ` +
      `stroke-fade 0.3s ${delay + STROKE_DURATION + FILL_DELAY}s ease-out forwards`;
    g.appendChild(strokePath);

    const fillPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    fillPath.setAttribute('d', dMatch[1]);
    fillPath.setAttribute('class', 'char-path-fill');
    fillPath.style.fill = msg.fillColor;
    fillPath.style.animation =
      `fill-reveal 0.3s ${delay + STROKE_DURATION * 0.6}s ease-in forwards`;
    g.appendChild(fillPath);

    svgEl.appendChild(g);
  }

  msg.xOffset += advance;

  const totalHeight = msg.lineData.length * ANIM_LINE_HEIGHT + ANIM_FONT_SIZE * 0.5;
  const containerWidth = getContainerWidthFor(msg);
  svgEl.setAttribute('viewBox', `0 0 ${containerWidth} ${totalHeight}`);
  svgEl.style.height = totalHeight + 'px';
}

function renderCharToSVG(char, charIndex, isBold, isItalic) {
  renderCharToSVGFor(activeMsg, char, charIndex, isBold, isItalic);
}

function processTokensFor(msg, tokens) {
  if (!msg) return;

  for (const tok of tokens) {
    if (tok.char === '\n') {
      flushWordFor(msg);
      msg.pendingNewlines++;
    } else {
      if (msg.pendingNewlines > 0) {
        if (msg.pendingNewlines >= 2) {
          startNewLineFor(msg, PARAGRAPH_GAP);
        } else {
          startNewLineFor(msg);
        }
        msg.pendingNewlines = 0;
      }

      if (tok.char === ' ') {
        flushWordFor(msg);
        renderCharToSVGFor(msg, ' ', msg.animatedChars, false, false);
        msg.animatedChars++;
      } else {
        msg.wordBuffer.push(tok);
      }
    }
  }
}

function processTokens(tokens) {
  processTokensFor(activeMsg, tokens);
}

function appendChunkTo(msg, chunk) {
  if (!msg) return;
  msg.fullText += chunk;

  msg.textLayer.innerHTML = renderMarkdown(msg.fullText);

  if (fontLoaded && msg.svgEl) {
    const tokens = msg.mdParser.feed(chunk);
    processTokensFor(msg, tokens);
  }

  scrollToBottom();
}

function appendChunk(chunk) {
  appendChunkTo(activeMsg, chunk);
}

function _buildAurynCard(seg) {
  const card = document.createElement('div');
  card.className = 'auryn-card';
  if (seg.subcommand) card.dataset.subcommand = seg.subcommand;

  const header = document.createElement('div');
  header.className = 'auryn-card-header';

  const opName = document.createElement('span');
  opName.className = 'auryn-op-name';
  opName.textContent = seg.type === 'auryn' ? (seg.subcommand || 'auryn') : 'shell';
  header.appendChild(opName);

  // DreamNode thumbnails
  if (seg.id_details && seg.id_details.length > 0) {
    const thumbs = document.createElement('div');
    thumbs.className = 'auryn-thumbnails';

    seg.id_details.forEach((detail, i) => {
      if (i > 0) {
        const arrow = document.createElement('span');
        arrow.className = 'auryn-arrow';
        arrow.textContent = '\u2192';
        thumbs.appendChild(arrow);
      }
      if (detail.dreamTalk) {
        const img = document.createElement('img');
        img.className = 'auryn-thumb';
        img.src = BASE_PATH + '/api/dreamtalk/' + encodeURIComponent(detail.id);
        img.title = detail.title || detail.id;
        img.onerror = () => {
          const fb = document.createElement('span');
          fb.className = 'auryn-thumb-fallback';
          fb.textContent = (detail.title || '??').slice(0, 2).toUpperCase();
          fb.title = detail.title || detail.id;
          img.replaceWith(fb);
        };
        thumbs.appendChild(img);
      } else {
        const fb = document.createElement('span');
        fb.className = 'auryn-thumb-fallback';
        fb.textContent = (detail.title || '??').slice(0, 2).toUpperCase();
        fb.title = detail.title || detail.id;
        thumbs.appendChild(fb);
      }
    });

    header.appendChild(thumbs);
  }

  card.appendChild(header);

  // Collapsible raw command
  const cmdDetails = document.createElement('details');
  const cmdSummary = document.createElement('summary');
  cmdSummary.textContent = 'Command';
  const cmdPre = document.createElement('pre');
  cmdPre.textContent = seg.raw;
  cmdDetails.appendChild(cmdSummary);
  cmdDetails.appendChild(cmdPre);
  card.appendChild(cmdDetails);

  // Output placeholder (filled by handleToolCallResult)
  const outDetails = document.createElement('details');
  const outSummary = document.createElement('summary');
  outSummary.textContent = 'Output';
  const outPre = document.createElement('pre');
  outPre.className = 'tool-output';
  outDetails.appendChild(outSummary);
  outDetails.appendChild(outPre);
  card.appendChild(outDetails);

  return card;
}

function handleToolCallStart(toolName, toolInput, cwd, aurynMeta, silent) {
  if (!activeMsg) return;

  // Silent tool calls (e.g. auryn read) — don't create a visible card
  // The result still goes to the LLM; petal-add handles the UI side
  if (silent) {
    // Still track in accumulatedContent so tool result can be stored
    if (activeMsg.accumulatedContent) {
      activeMsg.accumulatedContent.push({
        type: 'tool',
        name: toolName,
        input: toolInput,
        output: null
      });
    }
    return;
  }

  // Flush any pending animation state for the current text segment
  if (activeMsg.mdParser) {
    const remaining = activeMsg.mdParser.flush();
    processTokensFor(activeMsg, remaining);
  }
  if (activeMsg.wordBuffer && activeMsg.wordBuffer.length > 0) {
    flushWordFor(activeMsg);
  }

  const command = (toolName === 'bash') ? (toolInput.command || '') : '';
  const isCC = command.match(/^auryn\s+cc\s+/);
  const hasAurynMeta = aurynMeta && aurynMeta.segments && aurynMeta.segments.length > 0;

  // Build the tool block
  let block;

  if (toolName === 'bash' && hasAurynMeta && !isCC) {
    // Rich auryn command cards
    if (aurynMeta.is_compound) {
      // Compound command — container with sub-cards
      block = document.createElement('div');
      block.className = 'tool-call-block auryn-compound';
      block.dataset.toolName = toolName;

      aurynMeta.segments.forEach((seg, idx) => {
        if (idx > 0 && seg.connector) {
          const conn = document.createElement('div');
          conn.className = 'auryn-connector';
          conn.textContent = seg.connector === 'pipe' ? '|' : '&&';
          block.appendChild(conn);
        }
        block.appendChild(_buildAurynCard(seg));
      });
    } else {
      // Single auryn command
      const seg = aurynMeta.segments[0];
      block = _buildAurynCard(seg);
      block.classList.add('tool-call-block');
      block.dataset.toolName = toolName;
    }
  } else if (toolName === 'bash' && isCC) {
    // Claude Code card — same as before
    block = document.createElement('div');
    block.className = 'tool-call-block';
    block.dataset.toolName = toolName;

    const header = document.createElement('div');
    header.className = 'tool-header';

    const nameEl = document.createElement('div');
    nameEl.className = 'tool-name';
    nameEl.textContent = '[claude code]';
    header.appendChild(nameEl);

    const spinner = document.createElement('span');
    spinner.className = 'cc-spinner';
    header.appendChild(spinner);

    const ccStopBtn = document.createElement('button');
    ccStopBtn.className = 'tool-stop-btn';
    ccStopBtn.innerHTML = '&#9632;';
    ccStopBtn.title = 'Stop Claude Code';
    ccStopBtn.addEventListener('click', () => {
      if (currentRequestId && aiBridgeWs && aiBridgeWs.readyState === WebSocket.OPEN) {
        aiBridgeWs.send(JSON.stringify({
          type: 'tool-call-cancel',
          requestId: currentRequestId
        }));
      }
      ccStopBtn.classList.add('hidden');
      const sp = block.querySelector('.cc-spinner');
      if (sp) sp.remove();
    });
    header.appendChild(ccStopBtn);

    if (cwd) {
      const openBtn = document.createElement('button');
      openBtn.className = 'tool-stop-btn';
      openBtn.innerHTML = '&#8599;';
      openBtn.title = 'Open session in Terminal';
      openBtn.style.cssText = 'font-size:14px;';
      openBtn.addEventListener('click', () => {
        fetch(SERVER_BASE + '/api/spawn-terminal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cwd }),
        });
      });
      header.appendChild(openBtn);
    }

    block.appendChild(header);

    const inputDetails = document.createElement('details');
    const inputSummary = document.createElement('summary');
    inputSummary.textContent = 'Command';
    const inputPre = document.createElement('pre');
    inputPre.textContent = command;
    inputDetails.appendChild(inputSummary);
    inputDetails.appendChild(inputPre);
    block.appendChild(inputDetails);

    const activityDetails = document.createElement('details');
    activityDetails.open = true;
    const activitySummary = document.createElement('summary');
    activitySummary.textContent = 'Claude Code Activity';
    activitySummary.style.cssText = 'cursor:pointer;font-size:11px;color:#7ee787;padding:4px 0';
    activityDetails.appendChild(activitySummary);
    const activityDiv = document.createElement('div');
    activityDiv.className = 'cc-activity';
    activityDetails.appendChild(activityDiv);
    block.appendChild(activityDetails);
  } else {
    // Generic tool / non-auryn bash command — terminal-style card
    block = document.createElement('div');
    block.className = 'tool-call-block';
    block.dataset.toolName = toolName;

    const header = document.createElement('div');
    header.className = 'tool-header';
    const nameEl = document.createElement('div');
    nameEl.className = 'tool-name';
    nameEl.textContent = toolName === 'bash' ? '$ ' + (command.length > 80 ? command.slice(0, 80) + '...' : command) : '[' + toolName + ']';
    header.appendChild(nameEl);
    block.appendChild(header);

    if (toolName === 'bash') {
      const inputDetails = document.createElement('details');
      const inputSummary = document.createElement('summary');
      inputSummary.textContent = 'Command';
      const inputPre = document.createElement('pre');
      inputPre.textContent = command;
      inputDetails.appendChild(inputSummary);
      inputDetails.appendChild(inputPre);
      block.appendChild(inputDetails);
    } else {
      const inputDetails = document.createElement('details');
      const inputSummary = document.createElement('summary');
      inputSummary.textContent = 'Input';
      const inputPre = document.createElement('pre');
      inputPre.textContent = JSON.stringify(toolInput, null, 2);
      inputDetails.appendChild(inputSummary);
      inputDetails.appendChild(inputPre);
      block.appendChild(inputDetails);
    }
  }

  activeMsg.el.appendChild(block);

  // Save pre-tool text segment before resetting
  if (activeMsg.fullText) {
    activeMsg.accumulatedContent.push({ type: 'text', text: activeMsg.fullText });
  }
  // Track this tool call in accumulated content (output added in handleToolCallResult)
  activeMsg.accumulatedContent.push({ type: 'tool', name: toolName, input: toolInput, output: '' });

  // Start a fresh text segment inside the same bubble for post-tool text
  const newTextLayer = document.createElement('div');
  newTextLayer.className = 'text-layer';
  activeMsg.el.appendChild(newTextLayer);

  // Reset text segment state on activeMsg — same bubble, new segment
  activeMsg.textLayer = newTextLayer;
  activeMsg.fullText = '';
  activeMsg.mdParser = createMarkdownParser();
  activeMsg.xOffset = 0;
  activeMsg.lineData = [];
  activeMsg.animatedChars = 0;
  activeMsg.wordBuffer = [];
  activeMsg.pendingNewlines = 0;

  if (WRITE_ANIMATION_ENABLED && fontLoaded) {
    newTextLayer.style.visibility = 'hidden';
    const overlay = document.createElement('div');
    overlay.className = 'svg-overlay';
    const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgEl.style.overflow = 'visible';
    overlay.appendChild(svgEl);
    activeMsg.el.appendChild(overlay);
    activeMsg.svgOverlay = overlay;
    activeMsg.svgEl = svgEl;
    startNewLineFor(activeMsg);
  } else {
    activeMsg.svgOverlay = null;
    activeMsg.svgEl = null;
  }

  scrollToBottom();
}

function handleToolCallResult(toolName, result) {
  // Save tool output to accumulated content (even for silent/cardless tools)
  if (activeMsg && activeMsg.accumulatedContent) {
    for (let i = activeMsg.accumulatedContent.length - 1; i >= 0; i--) {
      const item = activeMsg.accumulatedContent[i];
      if (item.type === 'tool' && item.name === toolName && !item.output) {
        item.output = result || '(no output)';
        break;
      }
    }
  }

  // Handle reveal_file results BEFORE block lookup (works even for silent/missing cards)
  if (result && window.parent !== window) {
    try {
      const parsed = JSON.parse(result);
      if (parsed.action === 'reveal_file') {
        // Serve the file via local server (started by CLI bridge on port 8080)
        const fileUrl = 'http://127.0.0.1:8080/api/file?path=' + encodeURIComponent(parsed.relPath);
        const msg = {
          type: 'auryn-reveal-file',
          fileUrl: fileUrl,
          filePath: parsed.filePath,
          relPath: parsed.relPath,
          contentType: parsed.contentType,
          dreamnodeId: parsed.dreamnodeId,
          dreamnodeTitle: parsed.dreamnodeTitle,
          dreamnodeFolder: parsed.dreamnodeFolder,
        };
        window.parent.postMessage(msg, '*');
        // Also select the DreamNode in DreamSpace
        if (parsed.dreamnodeId) selectInDreamspace(parsed.dreamnodeId);
        console.log('[AURYN] reveal_file →', msg);
      }
    } catch (e) { /* not JSON or parse error */ }
  }

  // Find the most recent tool-call-block for this tool — now inside activeMsg.el
  const container = (activeMsg && activeMsg.el) ? activeMsg.el : messagesEl;
  const blocks = container.querySelectorAll('.tool-call-block[data-tool-name="' + toolName + '"]');
  const block = blocks[blocks.length - 1];
  if (!block) return;

  // Clean up spinner and stop button
  const spinner = block.querySelector('.cc-spinner');
  if (spinner) spinner.remove();
  const stopBtn = block.querySelector('.tool-stop-btn');
  if (stopBtn) stopBtn.classList.add('hidden');

  // For auryn cards with pre-existing output details, fill them in
  const existingOutput = block.querySelector('.tool-output');
  if (existingOutput) {
    existingOutput.textContent = result || '(no output)';
  } else if (block.classList.contains('auryn-compound')) {
    // For compound commands, fill the last card's output
    const cards = block.querySelectorAll('.auryn-card');
    const lastCard = cards[cards.length - 1];
    if (lastCard) {
      const output = lastCard.querySelector('.tool-output');
      if (output) output.textContent = result || '(no output)';
    }
  } else {
    // Standard fallback — add result details
    const resultDetails = document.createElement('details');
    const resultSummary = document.createElement('summary');
    resultSummary.textContent = 'Result';
    const resultPre = document.createElement('pre');
    resultPre.textContent = result || '(no output)';
    resultDetails.appendChild(resultSummary);
    resultDetails.appendChild(resultPre);
    block.appendChild(resultDetails);
  }
  scrollToBottom();
}

function handleCCActivity(event) {
  // Route Claude Code streaming events to the activity feed
  if (!activeMsg || !activeMsg.el) return;
  const blocks = activeMsg.el.querySelectorAll('.tool-call-block[data-tool-name="bash"]');
  const block = blocks[blocks.length - 1];
  if (!block) return;
  const activityDiv = block.querySelector('.cc-activity');
  if (!activityDiv) return;

  const etype = event.type || '';
  let text = '';
  let className = 'cc-event';

  if (etype === 'assistant' && event.message) {
    // Claude Code is thinking/writing — show a summary
    const content = event.message.content || [];
    for (const c of content) {
      if (c.type === 'tool_use') {
        const inp = c.input || {};
        let detail = '';
        if (c.name === 'Read') detail = inp.file_path || '';
        else if (c.name === 'Edit' || c.name === 'Write') detail = inp.file_path || '';
        else if (c.name === 'Bash') {
          const cmd = inp.command || '';
          detail = cmd.length > 120 ? cmd.slice(0, 120) + '...' : cmd;
        }
        else if (c.name === 'Grep') detail = (inp.pattern || '') + (inp.path ? ' in ' + inp.path : '');
        else if (c.name === 'Glob') detail = (inp.pattern || '') + (inp.path ? ' in ' + inp.path : '');
        text = c.name + (detail ? ': ' + detail : '');
        className += ' cc-event-tool';
      } else if (c.type === 'text' && c.text) {
        // Show last 120 chars of text
        const t = c.text.length > 120 ? '...' + c.text.slice(-120) : c.text;
        text = t.replace(/\n/g, ' ');
        className += ' cc-event-text';
      }
    }
  } else if (etype === 'tool' && event.tool) {
    // Tool result from Claude Code's internal tools
    const toolName = event.tool.name || '';
    const toolInput = event.tool.input || {};
    if (toolName === 'Read') {
      text = 'Read: ' + (toolInput.file_path || '');
    } else if (toolName === 'Edit') {
      text = 'Edit: ' + (toolInput.file_path || '');
    } else if (toolName === 'Write') {
      text = 'Write: ' + (toolInput.file_path || '');
    } else if (toolName === 'Bash') {
      text = '$ ' + (toolInput.command || '');
    } else if (toolName === 'Grep') {
      text = 'Grep: ' + (toolInput.pattern || '') + (toolInput.path ? ' in ' + toolInput.path : '');
    } else if (toolName === 'Glob') {
      text = 'Glob: ' + (toolInput.pattern || '') + (toolInput.path ? ' in ' + toolInput.path : '');
    } else {
      text = toolName;
    }
    className += ' cc-event-tool';
  } else if (etype === 'result') {
    const cost = event.total_cost_usd || 0;
    text = 'Done ($' + cost.toFixed(4) + ')';
    className += ' cc-event-result';
  }

  if (!text) return;

  const el = document.createElement('div');
  el.className = className;
  el.textContent = text;
  activityDiv.appendChild(el);

  // Keep only last 20 events visible
  while (activityDiv.children.length > 20) {
    activityDiv.removeChild(activityDiv.firstChild);
  }

  // Auto-scroll the activity feed
  activityDiv.scrollTop = activityDiv.scrollHeight;
  scrollToBottom();
}

function finishAnimatedMessage(msg, error) {
  if (!msg) return;

  if (msg.mdParser) {
    const remaining = msg.mdParser.flush();
    processTokensFor(msg, remaining);
  }
  if (msg.wordBuffer && msg.wordBuffer.length > 0) {
    flushWordFor(msg);
  }

  if (error) {
    const errEl = document.createElement('div');
    errEl.style.color = '#8B0000';
    errEl.style.fontSize = '13px';
    errEl.style.marginTop = '8px';
    errEl.textContent = 'Error: ' + error;
    msg.el.appendChild(errEl);
  }

  if (msg.svgOverlay && msg.svgEl) {
    const lastCharDelay = msg.animatedChars * CASCADE_DELAY;
    const totalAnimTime = (lastCharDelay + STROKE_DURATION + FILL_DELAY + 0.5) * 1000;

    setTimeout(() => {
      if (!msg.el) return;
      msg.svgOverlay.style.transition = 'opacity 0.4s ease-out';
      msg.svgOverlay.style.opacity = '0';
      msg.textLayer.style.visibility = 'visible';
      msg.textLayer.style.opacity = '0';
      msg.textLayer.style.transition = 'opacity 0.4s ease-in';
      msg.textLayer.offsetHeight;
      msg.textLayer.style.opacity = '1';

      setTimeout(() => {
        if (msg.svgOverlay && msg.svgOverlay.parentNode) {
          msg.svgOverlay.remove();
        }
      }, 500);
    }, totalAnimTime);
  } else {
    msg.textLayer.style.visibility = 'visible';
  }
}

function finishStream(error) {
  isStreaming = false;
  currentRequestId = null;
  sendBtn.style.display = '';
  stopBtn.style.display = 'none';
  updateSendButton();

  if (activeMsg) {
    finishAnimatedMessage(activeMsg, error);

    // Build the full assistant message content including tool calls
    const acc = activeMsg.accumulatedContent || [];
    // Add final text segment if any
    if (activeMsg.fullText) {
      acc.push({ type: 'text', text: activeMsg.fullText });
    }

    if (acc.length > 0) {
      // Serialize: text segments as-is, tool calls as labeled blocks
      const parts = [];
      for (const item of acc) {
        if (item.type === 'text' && item.text) {
          parts.push(item.text);
        } else if (item.type === 'tool') {
          parts.push(
            `\n[Tool: ${item.name}]\nInput: ${JSON.stringify(item.input)}\nOutput: ${item.output || '(no output)'}\n`
          );
        }
      }
      const fullContent = parts.join('\n');
      if (fullContent.trim()) {
        conversation.push({ role: 'assistant', content: fullContent });
      }
    }

    activeMsg = null;
  }

  saveChat();
  inputEl.focus();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

// 7. CHAT LOGIC
// ============================================================
async function sendMessage(text) {
  if (!text) text = inputEl.value.trim();

  // Include staged files in the message
  const stagedContext = getStagedContext();
  if (stagedContext) {
    text = text ? text + '\n\n' + stagedContext : stagedContext;
  }

  if (!text || isStreaming) return;

  // Hide autocomplete on send
  hideAutocomplete();

  const userMsg = document.createElement('div');
  userMsg.className = 'msg user';
  userMsg.textContent = text;
  messagesEl.appendChild(userMsg);

  conversation.push({ role: 'user', content: text });

  // Clear staged files after sending
  clearStaging();

  inputEl.value = '';
  inputEl.style.height = 'auto';
  updateSendButton();

  // Silently inject context node READMEs into system prompt (not in UI or chat history)
  let systemContent = SYSTEM_PROMPT;
  if (contextNodes.length > 0) {
    const readmePromises = contextNodes.map(n =>
      fetch(SERVER_BASE + '/readme?path=' + encodeURIComponent(n.path || n.absPath || n.repoPath || ''))
        .then(r => r.json())
        .catch(() => null)
    );
    const readmes = await Promise.all(readmePromises);
    const contextBlock = readmes
      .filter(r => r && r.readme)
      .map(r => `--- ${r.title} README ---\n${r.readme}`)
      .join('\n\n');
    if (contextBlock) {
      systemContent += '\n\n## Loaded DreamNode Context\n\nThe following DreamNode READMEs are loaded as context petals. Use these to answer questions and to route insights via auryn write.\n\n' + contextBlock;
    }
  }

  // Inject DreamSpace UI context if available
  if (window._dreamspaceContext) {
    const ctx = window._dreamspaceContext;
    const parts = [];
    if (ctx.selectedNode) {
      parts.push(`Selected DreamNode: ${ctx.selectedNode.name} (${ctx.selectedNode.type}, folder: ${ctx.selectedNode.folderName})`);
    }
    if (parts.length > 0) {
      systemContent += '\n\n## DreamSpace UI Context\n\n' + parts.join('\n');
    }
  }

  const messages = [
    { role: 'system', content: systemContent },
    ...conversation
  ];

  isStreaming = true;
  sendBtn.style.display = 'none';
  stopBtn.style.display = 'flex';

  createAssistantMessage();
  sendStreamRequest(messages);
  scrollToBottom();
}
